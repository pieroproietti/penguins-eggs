# Gentoo VM image — OpenRC init
# Architectures: amd64
# Source: liangyongxiang/my-gentoo-incus-scripts
image:
  distribution: gentoo
  description: "{{ image.distribution|capfirst }} {{ image.architecture_mapped }} VM{% if image.variant != \"default\" %} ({{ image.variant }}){% endif %} ({{ image.serial }})"

source:
  downloader: gentoo-http
  url: https://distfiles.gentoo.org/releases/

targets:
  incus:
    vm:
      filesystem: ext4
      size: 10737418240

files:
  packages:
    manager: portage
    update: false
    cleanup: true
    sets:
      - packages:
          - net-misc/dhcpcd
          - sys-boot/grub
          - sys-kernel/gentoo-kernel-bin
        action: install

actions:
  - trigger: post-files
    action: |-
      #!/bin/sh
      set -eux
      ln -s net.lo /etc/init.d/net.eth0
      mkdir -p /etc/runlevels/default
      rc-update add net.eth0 default || true
      grub-install /dev/vda || true
      grub-mkconfig -o /boot/grub/grub.cfg || true

environment:
  variables:
    - key: MAKEOPTS
      value: --jobs 4
