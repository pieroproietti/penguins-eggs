# Debian container + VM images
# Architectures: amd64, arm64, i386 (i386 container only)
# Releases: bookworm (12), trixie (13)
image:
  distribution: debian
  release: bookworm
  architecture: amd64
  variant: default
  name: "{{ image.distribution }}-{{ image.release }}-{{ image.variant }}-{{ image.serial }}"
  description: "Debian {{ image.release }} {{ image.architecture }}"

source:
  downloader: debootstrap
  url: http://deb.debian.org/debian
  keyserver: keyserver.ubuntu.com
  keys:
    - 0xA428DD335BE55F6E3DEF5B1F9B4BE8D9A0A90B5B

targets:
  lxc:
    create_message: |
      You just created a Debian {{ image.release }} container.
    config:
      - type: all
        before: 5
        content: |-
          lxc.include = LXC_TEMPLATE_CONFIG/debian.common.conf
      - type: user
        before: 5
        content: |-
          lxc.include = LXC_TEMPLATE_CONFIG/debian.userns.conf
      - type: all
        after: 4
        content: |-
          lxc.include = LXC_TEMPLATE_CONFIG/common.conf
      - type: user
        after: 4
        content: |-
          lxc.include = LXC_TEMPLATE_CONFIG/userns.conf

files:
  - path: /etc/hostname
    generator: hostname

  - path: /etc/hosts
    generator: hosts

  - path: /etc/machine-id
    generator: dump

  - path: /etc/network/interfaces
    generator: dump
    content: |-
      auto lo
      iface lo inet loopback

      auto eth0
      iface eth0 inet dhcp
    types:
      - container

  - path: /etc/systemd/network/eth0.network
    generator: dump
    content: |-
      [Match]
      Name=eth0

      [Network]
      DHCP=ipv4
    types:
      - vm

packages:
  manager: apt
  update: true
  cleanup: true
  sets:
    - packages:
        - apt-transport-https
        - curl
        - dbus
        - git
        - openssh-client
        - sudo
        - vim
      action: install

actions:
  - trigger: post-packages
    action: |-
      #!/bin/sh
      set -eux
      apt-get autoremove -y
      apt-get clean

mappings:
  architecture_map: debian
