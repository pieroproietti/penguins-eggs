# orangepi5 — Orange Pi 5 / 5B / 5 Plus (openFyde overlay-orangepi5-openfyde)
# SoC: RK3588S — shares foundation-rk3588 with rock5b
# NOT suitable as a generic container base — contains RK3588S + Mali firmware.
BOARD=orangepi5-openfyde
ARCH=arm64
CHOST=aarch64-cros-linux-gnu
BOOTSTRAP_ARCH=arm64
BOOTSTRAP_URL=https://github.com/debuerreotype/docker-debian-artifacts/releases/download/dist-arm64v8/debian-bookworm-slim.tar.xz
BOOTSTRAP_STRIP=0
PROFILE_PATH=default/linux/arm64/10.0/chromeos
GCC_USE_FLAGS=""
FOUNDATION_REPO=https://github.com/openFyde/foundation-rk3588
FOUNDATION_BRANCH=r120-dev
OVERLAY_REPO=https://github.com/openFyde/overlay-orangepi5-openfyde
OVERLAY_BASE_REPO=https://github.com/openFyde/overlay-orangepi5-openfyde-base
OVERLAY_BRANCH=main
KERNEL_REPO=https://github.com/openFyde/kernel-rockchip_6
KERNEL_BRANCH=main
PATCHES_REPO=https://github.com/openFyde/project-openfyde-patches
PATCHES_BRANCH=main
EXTRA_PACKAGES=""
