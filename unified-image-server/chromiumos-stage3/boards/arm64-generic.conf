# arm64-generic — generic arm64 ChromiumOS board (openFyde arm64-openfyde_vmware)
# Suitable for: arm64 container base images, arm64 stage3 tarballs
# Targets VMware on Apple Silicon and generic arm64 VMs — no hardware firmware deps.
BOARD=arm64-generic
ARCH=arm64
CHOST=aarch64-cros-linux-gnu
BOOTSTRAP_ARCH=arm64
# Debian arm64 bootstrap used because Arch Linux only publishes x86_64 bootstraps.
# qemu-user-static is required on x86_64 hosts for cross-bootstrap.
BOOTSTRAP_URL=https://github.com/debuerreotype/docker-debian-artifacts/releases/download/dist-arm64v8/debian-bookworm-slim.tar.xz
BOOTSTRAP_STRIP=0
PROFILE_PATH=default/linux/arm64/10.0/chromeos
GCC_USE_FLAGS=""
# openFyde arm64 overlay — provides arm64-generic board definition
OVERLAY_REPO=https://github.com/openFyde/overlay-arm64-openfyde_vmware
OVERLAY_BRANCH=main
PATCHES_REPO=https://github.com/openFyde/project-openfyde-patches
PATCHES_BRANCH=main
EXTRA_PACKAGES=""
