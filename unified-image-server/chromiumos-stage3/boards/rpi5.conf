# rpi5 — Raspberry Pi 5 (openFyde rpi5-openfyde)
# Suitable for: RPi5-specific arm64 container images
# NOT suitable as a generic container base — contains BCM2712 firmware.
BOARD=rpi5-openfyde
ARCH=arm64
CHOST=aarch64-cros-linux-gnu
BOOTSTRAP_ARCH=arm64
BOOTSTRAP_URL=https://github.com/debuerreotype/docker-debian-artifacts/releases/download/dist-arm64v8/debian-bookworm-slim.tar.xz
BOOTSTRAP_STRIP=0
PROFILE_PATH=default/linux/arm64/10.0/chromeos
GCC_USE_FLAGS=""
OVERLAY_REPO=https://github.com/openFyde/overlay-rpi5-openfyde
OVERLAY_BRANCH=main
PATCHES_REPO=https://github.com/openFyde/project-openfyde-patches
PATCHES_BRANCH=main
EXTRA_PACKAGES=""
