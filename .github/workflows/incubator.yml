name: Incubator Batch CI

on:
  workflow_dispatch: 
  # push: 

jobs:
  collaudo-batch:
    name: 🐣 Schiusa e Collaudo Batch
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout del Repository
        uses: actions/checkout@v4

      - name: 🚚 Deploy di incubator.sh dal Repo al Cantiere (Proxmox)
        run: |
          # 1. Distruggiamo e ri-creiamo la cartella sull'host
          ssh root@father "rm -fr /root/ci"
          ssh root@father "mkdir -p /root/ci"
          
          # 2. Copiamo lo script DIRETTAMENTE dal repository scaricato all'host Proxmox
          # (Assumiamo che tu abbia salvato incubator.sh dentro una cartella "ci" nel repo)
          scp ci/incubator.sh root@father:/root/ci/incubator.sh
          
          # 3. Lo rendiamo eseguibile
          ssh root@father "chmod +x /root/ci/incubator.sh"

      - name: ⚙️ Avvio Nastro Trasportatore (Incubator)
        run: |
          ssh root@father "cd /root/ci && ./incubator.sh /var/lib/vz/template/iso/"

      - name: 📋 Recupero di TUTTI i Referti (Artefatti)
        if: always() 
        run: |
          mkdir -p ./incubator-logs
          scp root@father:/root/ci/incubator.log ./incubator-logs/ || true
          scp root@father:/root/ci/console-SUCCESS-*.log ./incubator-logs/ 2>/dev/null || true
          scp root@father:/root/ci/console-FAILED-*.log ./incubator-logs/ 2>/dev/null || true
          scp root@father:/root/ci/krill-output-*.txt ./incubator-logs/ 2>/dev/null || true

      - name: 📤 Upload Artefatti su Web
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incubator-batch-reports
          path: ./incubator-logs/
