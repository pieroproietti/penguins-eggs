name: "🐣 Incubator Batch CI"

on:
  workflow_dispatch:
    inputs:
      fstype:
        description: 'Seleziona il filesystem da testare'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'ext4'
          - 'btrfs'

jobs:
  setup:
    name: ⚙️ Setup Test Matrix
    runs-on: self-hosted
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          CHOICE="${{ github.event.inputs.fstype }}"
          CHOICE="${CHOICE:-all}"
          if [ "$CHOICE" = "ext4" ]; then
            echo 'matrix={"include":[{"fstype":"ext4","firmware":"bios","vmid":150,"template":"90150"},{"fstype":"ext4","firmware":"uefi","vmid":151,"template":"90160"}]}' >> $GITHUB_OUTPUT
          elif [ "$CHOICE" = "btrfs" ]; then
            echo 'matrix={"include":[{"fstype":"btrfs","firmware":"uefi","vmid":152,"template":"90160"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"fstype":"ext4","firmware":"bios","vmid":150,"template":"90150"},{"fstype":"ext4","firmware":"uefi","vmid":151,"template":"90160"},{"fstype":"btrfs","firmware":"uefi","vmid":152,"template":"90160"}]}' >> $GITHUB_OUTPUT
          fi

  collaudo-batch:
    name: 🐣 Batch Hatching and Testing (${{ matrix.firmware }} ${{ matrix.fstype }})
    needs: setup
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: 📥 Repository Checkout
        uses: actions/checkout@v4

      - name: 🚚 Deploy incubator.sh from Repo to Proxmox
        run: |
          # 1. Distruggiamo e ri-creiamo la cartella specifica sull'host
          ssh root@father "rm -fr /root/ci-${{ matrix.firmware }}-${{ matrix.fstype }}"
          ssh root@father "mkdir -p /root/ci-${{ matrix.firmware }}-${{ matrix.fstype }}"
          
          # 2. Copiamo lo script DIRETTAMENTE dal repository scaricato all'host Proxmox
          # (Assumiamo che tu abbia salvato incubator.sh dentro una cartella "ci" nel repo)
          scp ci/incubator.sh root@father:/root/ci-${{ matrix.firmware }}-${{ matrix.fstype }}/incubator.sh
          
          # 3. Lo rendiamo eseguibile
          ssh root@father "chmod +x /root/ci-${{ matrix.firmware }}-${{ matrix.fstype }}/incubator.sh"

      - name: ⚙️ Run Incubator Batch
        run: |
          ssh root@father "cd /root/ci-${{ matrix.firmware }}-${{ matrix.fstype }} && FIRMWARE=${{ matrix.firmware }} FSTYPE=${{ matrix.fstype }} VMID=${{ matrix.vmid }} TEMPLATE=${{ matrix.template }} ./incubator.sh /var/lib/vz/template/iso/"

      - name: 📋 Collect ALL Reports (Artifacts)
        if: always() 
        run: |
          mkdir -p ./incubator-logs
          scp root@father:/root/ci-${{ matrix.firmware }}-${{ matrix.fstype }}/incubator-*.log ./incubator-logs/ || true
          scp root@father:/root/ci-${{ matrix.firmware }}-${{ matrix.fstype }}/console-SUCCESS-*.log ./incubator-logs/ 2>/dev/null || true
          scp root@father:/root/ci-${{ matrix.firmware }}-${{ matrix.fstype }}/console-FAILED-*.log ./incubator-logs/ 2>/dev/null || true
          scp root@father:/root/ci-${{ matrix.firmware }}-${{ matrix.fstype }}/krill-output-*.txt ./incubator-logs/ 2>/dev/null || true

      - name: 📤 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incubator-batch-reports-${{ matrix.firmware }}-${{ matrix.fstype }}
          path: ./incubator-logs/

  summary:
    name: 📊 Generate Summary Report
    needs: collaudo-batch
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 🔨 Generate Matrix Table
        run: |
          echo "## Risultati CI Incubator" >> $GITHUB_STEP_SUMMARY
          echo "| distro | bios ext4 | uefi ext4 | uefi btrfs |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|-----------|------------|" >> $GITHUB_STEP_SUMMARY
          
          # Creiamo script python per estrarre e creare la tabella
          cat << 'EOF' > generate_summary.py
          import os
          import glob
          import re

          # Dizionario { "distro": { "bios ext4": "OK", "uefi ext4": "OK", "uefi btrfs": "FAILED" } }
          results = {}

          # Troviamo tutti i log
          log_files = glob.glob("artifacts/incubator-batch-reports-*/incubator-*.log")
          
          for log_file in log_files:
              # Ricaviamo firmware e fstype dal nome della cartella (es. artifacts/incubator-batch-reports-bios-ext4)
              folder = os.path.dirname(log_file)
              parts = folder.split("incubator-batch-reports-")
              if len(parts) > 1:
                  conf = parts[1]
                  # conf può essere bios-ext4, uefi-ext4, uefi-btrfs
                  conf = conf.replace("-", " ")
              else:
                  continue
                  
              with open(log_file, 'r', encoding='utf-8') as f:
                  content = f.read()
                  
              # Ogni blocco è separato da ============
              # E ha campi ISO: e RESULT:
              entries = content.split("=================================================")
              for entry in entries:
                  if "ISO:" in entry and "RESULT:" in entry:
                      iso_match = re.search(r'ISO:\s*(.+)', entry)
                      result_match = re.search(r'RESULT:\s*(.+)', entry)
                      
                      if iso_match and result_match:
                          iso = iso_match.group(1).strip()
                          result = result_match.group(1).strip()
                          
                          # Estraiamo la distro dal nome iso (es. egg-of-ubuntu-xxx.iso -> ubuntu)
                          distro = iso.replace("egg-of-", "").split("-")[0]
                          if distro == iso:
                              distro = "generic"
                              
                          # Semplifichiamo il risultato in OK o emoji/testo
                          if "INSTALLATION COMPLETED" in result:
                              status = "✅ OK"
                          else:
                              status = "❌ FAILED"
                              
                          if distro not in results:
                              results[distro] = {"bios ext4": "-", "uefi ext4": "-", "uefi btrfs": "-"}
                              
                          results[distro][conf] = status

          # Scriviamo il risultato su stdout (che verrà appeso a GITHUB_STEP_SUMMARY)
          for distro, cols in results.items():
              print(f"| {distro} | {cols.get('bios ext4', '-')} | {cols.get('uefi ext4', '-')} | {cols.get('uefi btrfs', '-')} |")
          
          EOF
          
          python3 generate_summary.py >> $GITHUB_STEP_SUMMARY
