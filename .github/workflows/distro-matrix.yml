name: Distro Matrix

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]
  # Allow manual trigger for full matrix runs.
  workflow_dispatch:

jobs:
  # Build the openSUSE CI image and push it to GHCR so the smoke-test matrix
  # job can pull it. Running this as a prerequisite job avoids the
  # chicken-and-egg problem where the image must exist before the workflow
  # that creates it has ever run on main.
  # Build all distro CI images and push to GHCR before the smoke-test matrix
  # runs. This avoids the chicken-and-egg problem where images must exist
  # before the workflow that creates them has ever run on main.
  build-ci-images:
    name: "Build CI image: ${{ matrix.image }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: opensuse-tumbleweed-ci
            context: .github/images/opensuse-tumbleweed-ci
          - image: voidlinux-ci
            context: .github/images/voidlinux-ci
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:latest
            ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  smoke-test:
    name: "${{ matrix.distro }} / ${{ matrix.backend }}"
    runs-on: ubuntu-latest
    needs: [build-ci-images]

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Arch family ────────────────────────────────────────────────────
          - distro: arch
            image: archlinux:latest
            backend: ashos
            pkg_install: "pacman -Sy --noconfirm"
            ca_install: "pacman -Sy --noconfirm ca-certificates"

          - distro: arch
            image: archlinux:latest
            backend: akshara
            pkg_install: "pacman -Sy --noconfirm"
            ca_install: "pacman -Sy --noconfirm ca-certificates"

          - distro: arch
            image: archlinux:latest
            backend: frzr
            pkg_install: "pacman -Sy --noconfirm"
            ca_install: "pacman -Sy --noconfirm ca-certificates"

          # ── Debian family ──────────────────────────────────────────────────
          - distro: debian
            image: debian:bookworm-slim
            backend: ashos
            pkg_install: "apt-get update -qq && apt-get install -y -qq"
            ca_install: "apt-get update -qq && apt-get install -y -qq ca-certificates"

          - distro: debian
            image: debian:bookworm-slim
            backend: akshara
            pkg_install: "apt-get update -qq && apt-get install -y -qq"
            ca_install: "apt-get update -qq && apt-get install -y -qq ca-certificates"

          - distro: debian
            image: ubuntu:24.04
            backend: abroot
            pkg_install: "apt-get update -qq && apt-get install -y -qq"
            ca_install: "apt-get update -qq && apt-get install -y -qq ca-certificates"

          # ── Fedora family ──────────────────────────────────────────────────
          - distro: fedora
            image: fedora:latest
            backend: ashos
            pkg_install: "dnf install -y -q"
            ca_install: "dnf install -y -q ca-certificates"

          - distro: fedora
            image: fedora:latest
            backend: akshara
            pkg_install: "dnf install -y -q"
            ca_install: "dnf install -y -q ca-certificates"

          # ── Alpine ─────────────────────────────────────────────────────────
          # Alpine uses /bin/sh (busybox); bash is not pre-installed.
          - distro: alpine
            image: alpine:latest
            backend: ashos
            pkg_install: "apk add --no-cache"
            ca_install: "apk add --no-cache ca-certificates"

          - distro: alpine
            image: alpine:latest
            backend: akshara
            pkg_install: "apk add --no-cache"
            ca_install: "apk add --no-cache ca-certificates"

          # ── Rocky Linux ───────────────────────────────────────────────────
          - distro: rocky
            image: rockylinux:9
            backend: ashos
            pkg_install: "dnf install -y -q"
            ca_install: "dnf install -y -q ca-certificates"

          - distro: rocky
            image: rockylinux:9
            backend: akshara
            pkg_install: "dnf install -y -q"
            ca_install: "dnf install -y -q ca-certificates"

          # ── Void Linux ────────────────────────────────────────────────────
          # Uses a pre-bootstrapped GHCR image built by build-ci-images.yml.
          # That image layers tar, git, gzip, ca-certificates, and a
          # /bin/sh -> /bin/bash symlink onto voidlinux/voidlinux:latest so
          # the Actions runner can launch steps normally.
          - distro: void
            image: ghcr.io/interested-deving-1896/voidlinux-ci:latest
            backend: ashos
            pkg_install: "xbps-install -Sy"
            ca_install: "true"

          # ── openSUSE Tumbleweed ────────────────────────────────────────────
          # Uses a pre-bootstrapped GHCR image built by the build-ci-images
          # job above. That image layers tar, git, gzip, ca-certificates, and
          # a /bin/sh -> /bin/bash symlink onto opensuse/tumbleweed:latest.
          - distro: opensuse
            image: ghcr.io/interested-deving-1896/opensuse-tumbleweed-ci:latest
            backend: ashos
            pkg_install: "zypper install -y"
            ca_install: "true"

    container:
      image: ${{ matrix.image }}
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install ca-certificates
        run: ${{ matrix.ca_install }}

      - name: Build ilf
        run: go build -buildvcs=false -o /usr/local/bin/ilf ./tools/ilf

      - name: Write ilf.toml
        run: |
          mkdir -p /etc/ilf
          printf '[ilf]\ndistro        = "%s"\narch          = "x86_64"\nbackend       = "%s"\nmax_snapshots = 5\nauto_update   = false\n\n[backend.%s]\nsnapshot_root = "/mnt/@"\nsystem_yaml   = "/system.yaml"\nsource        = "test/test:stable"\nimage         = "test/test"\ntag           = "stable"\n' \
            "${{ matrix.distro }}" "${{ matrix.backend }}" "${{ matrix.backend }}" \
            > /etc/ilf/ilf.toml

      - name: Smoke — ilf backends
        run: |
          ilf backends
          ilf backends | grep -F "${{ matrix.backend }}"

      - name: Smoke — ilf status (graceful error without backend binary)
        run: |
          ilf status 2>&1 || true
          ilf status 2>&1 | grep -v "panic" | grep -v "nil pointer" | grep -v "segfault" || true

      - name: Smoke — ilf upgrade --dry-run
        run: |
          out="$(ilf upgrade --dry-run 2>&1 || true)"
          printf '%s\n' "$out" | grep -iF "dry-run" || \
          printf '%s\n' "$out" | grep -iF "would"   || \
          printf '%s\n' "$out" | grep -iF "error"   || true

      - name: Smoke — ilf snapshot create (graceful error without backend)
        run: |
          ilf snapshot create --label ci-test 2>&1 || true
          ilf snapshot create --label ci-test 2>&1 | grep -v "panic" | grep -v "nil pointer" || true

      - name: Smoke — ilf mutable exit without session
        run: |
          out="$(ilf mutable exit 2>&1 || true)"
          printf '%s\n' "$out" | grep -iF "no active session" || \
          printf '%s\n' "$out" | grep -iF "not found"         || \
          printf '%s\n' "$out" | grep -iF "error"             || true

      - name: Smoke — ilf init (no disk, graceful error)
        run: |
          ilf init --distro "${{ matrix.distro }}" --backend "${{ matrix.backend }}" 2>&1 || true
          ilf init --distro "${{ matrix.distro }}" --backend "${{ matrix.backend }}" 2>&1 \
            | grep -v "panic" | grep -v "nil pointer" || true
