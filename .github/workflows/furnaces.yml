name: "🏭 Furnaces: Install and Remaster"

on:
  workflow_dispatch:

jobs:
  bake-isos:
    name: 🏭 Build ISO su ${{ matrix.os }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: alpine
            vmid: 301 # 👈 Modifica se l'ID su Proxmox è diverso
            snapshot: virgin
            subnet: "192.168.1"
            artifact_url: "https://github.com/pieroproietti/penguins-eggs/releases/latest/download/penguins-eggs-alpine.zip"
            prep_cmd: "sh -c 'apk update && apk add wget unzip sshpass'"
            install_cmd: "apk add --allow-untrusted ./*.apk"

          - os: arch
            vmid: 302
            snapshot: virgin
            subnet: "192.168.1" # 👈 La classe IP della tua rete (senza l'ultimo numero)
            artifact_url: "https://github.com/pieroproietti/penguins-eggs/releases/latest/download/penguins-eggs-arch.zip"
            prep_cmd: "sh -c 'pacman -Sy --noconfirm wget unzip sshpass'"
            install_cmd: "pacman -U --noconfirm *.pkg.tar.zst"
            
          - os: debian
            vmid: 303
            snapshot: virgin
            subnet: "192.168.1" # 👈 La classe IP della tua rete
            artifact_url: "https://github.com/pieroproietti/penguins-eggs/releases/latest/download/penguins-eggs-debian.zip"
            prep_cmd: "sh -c 'apt-get update && apt-get install -y wget unzip sshpass'"
            install_cmd: "apt install -y ./*.deb"

          - os: devuan
            vmid: 304
            snapshot: virgin
            subnet: "192.168.1"
            artifact_url: "https://github.com/pieroproietti/penguins-eggs/releases/latest/download/penguins-eggs-debian.zip"
            prep_cmd: "sh -c 'apt-get update && apt-get install -y wget unzip sshpass'"
            install_cmd: "apt install -y ./*.deb"

          - os: fedora
            vmid: 305
            snapshot: virgin
            subnet: "192.168.1"
            artifact_url: "https://github.com/pieroproietti/penguins-eggs/releases/latest/download/penguins-eggs-fedora.zip"
            prep_cmd: "sh -c 'dnf makecache && dnf install -y wget unzip sshpass'"
            install_cmd: "dnf install -y ./*.rpm"

          - os: manjaro
            vmid: 306
            snapshot: virgin
            subnet: "192.168.1"
            artifact_url: "https://github.com/pieroproietti/penguins-eggs/releases/latest/download/penguins-eggs-manjaro.zip"
            prep_cmd: "sh -c 'pacman -Sy --noconfirm wget unzip sshpass'"
            install_cmd: "pacman -U --noconfirm *.pkg.tar.zst"

          - os: opensuse
            vmid: 307
            snapshot: virgin
            subnet: "192.168.1"
            artifact_url: "https://github.com/pieroproietti/penguins-eggs/releases/latest/download/penguins-eggs-opensuse.zip"
            prep_cmd: "sh -c 'zypper -n refresh && zypper -n install wget unzip sshpass'"
            install_cmd: "zypper -n --no-gpg-checks install ./*.rpm"
            
          - os: ubuntu
            vmid: 308
            snapshot: virgin
            subnet: "192.168.1"
            artifact_url: "https://github.com/pieroproietti/penguins-eggs/releases/latest/download/penguins-eggs-debian.zip"
            prep_cmd: "sh -c 'apt-get update && apt-get install -y wget unzip sshpass'"
            install_cmd: "apt install -y ./*.deb"
            
    steps:
      - name: 🔐 Air-gapped Secrets Loading
        run: |
          source /etc/p4/secrets.env
          
          # Ordina a GitHub di censurare queste parole nei log
          echo "::add-mask::$SSH_PASSWD"
          echo "::add-mask::$PROXMOX_PASSWD"
          
          echo "VM_USER=$SSH_USER" >> $GITHUB_ENV
          echo "VM_PASS=$SSH_PASSWD" >> $GITHUB_ENV
          echo "PVE_PASS=$PROXMOX_PASSWD" >> $GITHUB_ENV

      - name: 🔄 Rollback & VM Boot
        env:
          SSHPASS: ${{ env.PVE_PASS }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null artisan@father "echo '${{ env.PVE_PASS }}' | sudo -S sh -c 'qm stop ${{ matrix.vmid }} || true; qm rollback ${{ matrix.vmid }} ${{ matrix.snapshot }}; qm start ${{ matrix.vmid }} || true'"

      - name: 📡 Dynamic IP Discovery
        id: get_ip
        env:
          SSHPASS: ${{ env.PVE_PASS }}
        run: |
          IP=$(sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null artisan@father '
            # 1. Legge il MAC address in tempo reale direttamente da Proxmox
            MAC=$(echo "${{ env.PVE_PASS }}" | sudo -S qm config ${{ matrix.vmid }} | grep "net0" | grep -o -E "([[:xdigit:]]{2}:){5}[[:xdigit:]]{2}" | tr "[:upper:]" "[:lower:]")
            
            echo "Searching for IP address for MAC $MAC on network ${{ matrix.subnet }}.x..." >&2
            
            # 2. Sweep ARP Veloce (Bypassa i blocchi dei kernel moderni)
            while true; do
              for i in {1..254}; do ping -c 1 -W 1 ${{ matrix.subnet }}.$i >/dev/null 2>&1 & done
              wait
              
              # Trova il MAC nella tabella di Proxmox ed estrae solo l IP
              FOUND=$(ip -4 neigh show | grep -i "$MAC" | cut -d" " -f1 | head -n 1)
              if [ -n "$FOUND" ]; then
                echo "$FOUND"
                break
              fi
              sleep 2
            done
          ')
          echo "✅ IP Assigned: $IP"
          echo "VM_IP=$IP" >> $GITHUB_ENV

      - name: ⏳ Waiting for VM SSH daemon...
        env:
          SSHPASS: ${{ env.VM_PASS }}
        run: |
          while ! sshpass -e ssh -o ConnectTimeout=2 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -q ${{ env.VM_USER }}@${{ env.VM_IP }} exit; do
            sleep 2
            echo -n "s"
          done
          echo -e "\n✅ SSH service ready!"

      - name: 🛠️ Installa package penguins-eggs, Remaster and Export
        env:
          SSHPASS: ${{ env.VM_PASS }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ env.VM_USER }}@${{ env.VM_IP }} << EOF
            echo "📦 Preparing Environment (${{ matrix.os }})..."
            echo '${{ env.VM_PASS }}' | sudo -S ${{ matrix.prep_cmd }}
            
            echo "📥 Download artefact..."
            wget -q -O pacchetti.zip "${{ matrix.artifact_url }}"
            unzip -o pacchetti.zip
            
            echo "⚙️ penguins-eggs Installation..."
            echo '${{ env.VM_PASS }}' | sudo -S ${{ matrix.install_cmd }}
            
            echo "💿 Creating Live ISO (eggs remaster)..."
            echo '${{ env.VM_PASS }}' | sudo -S coa remaster
            
            echo "🚀 SSH Configuration & ISO Export.."
            mkdir -p /home/${{ env.VM_USER }}/.ssh
            echo "Host *" > /home/${{ env.VM_USER }}/.ssh/config
            echo "    StrictHostKeyChecking no" >> /home/${{ env.VM_USER }}/.ssh/config
            echo "    UserKnownHostsFile /dev/null" >> /home/${{ env.VM_USER }}/.ssh/config
            
            SSHPASS='${{ env.PVE_PASS }}' sshpass -e eggs export iso --clean
          EOF

      - name: 🛑 VM Shutdown
        if: always()
        env:
          SSHPASS: ${{ env.PVE_PASS }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null artisan@father "echo '${{ env.PVE_PASS }}' | sudo -S qm shutdown ${{ matrix.vmid }}"
