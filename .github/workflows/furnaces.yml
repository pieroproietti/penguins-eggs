name: "🏗️ Factory: complete remaster"

on:
  workflow_dispatch:

jobs:
  test-remaster:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        distro: [debian, arch, fedora, alpine]
            
    steps:
      - uses: actions/checkout@v4

      - name: Deploy and Remaster
        run: |
          # 1. Recupero VMID dal file p4config (Senza doverlo scrivere qui)
          VMID=$(grep "VM_ID_${{ matrix.distro }}" ./bin/p4config | cut -d'=' -f2 | tr -d '"')
          TARGET_IP="192.168.1.$VMID"
          
          # 2. Teletrasporto (usa la nostra logica p4deploy)
          ./bin/p4deploy ${{ matrix.distro }}
          
          # 3. Sequenza Operativa remota
          echo "🚀 Lancio procedure di remaster su ${{ matrix.distro }} ($TARGET_IP)..."
          
          ssh artisan@$TARGET_IP << EOF
            sudo ./bin/install-native /tmp/*.pkg.* /tmp/*.rpm /tmp/*.deb /tmp/*.apk 2>/dev/null
            sudo eggs tools clean
            sudo eggs destroy
            sudo eggs remaster
          EOF
          
          # 4. Recupero dell'uovo
          scp artisan@$TARGET_IP:/home/eggs/egg*.iso ./egg-${{ matrix.distro }}.iso
          
          # 5. Spegnimento
          ssh artisan@$TARGET_IP "sudo poweroff"

      - name: Upload Artefatto ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.distro }}-egg
          path: ./egg-${{ matrix.distro }}.iso
          retention-days: 3
          