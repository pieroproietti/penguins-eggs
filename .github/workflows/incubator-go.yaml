name: "🐣 A Go Incubator Batch CI"

on:
  workflow_dispatch:
    inputs:
      fstype:
        description: 'Select the filesystem to test'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'ext4'
          - 'btrfs'

jobs:
  setup:
    name: ⚙️ Setup Test Matrix
    runs-on: self-hosted
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          CHOICE="${{ github.event.inputs.fstype }}"
          CHOICE="${CHOICE:-all}"
          if [ "$CHOICE" = "ext4" ]; then
            # VMID spacing: 150 and 160
            echo 'matrix={"include":[{"fstype":"ext4","firmware":"bios","vmid":150},{"fstype":"ext4","firmware":"uefi","vmid":160}]}' >> $GITHUB_OUTPUT
          elif [ "$CHOICE" = "btrfs" ]; then
            echo 'matrix={"include":[{"fstype":"btrfs","firmware":"uefi","vmid":170}]}' >> $GITHUB_OUTPUT
          else
            # Spacing: 150, 160, 170
            echo 'matrix={"include":[{"fstype":"ext4","firmware":"bios","vmid":150},{"fstype":"ext4","firmware":"uefi","vmid":160},{"fstype":"btrfs","firmware":"uefi","vmid":170}]}' >> $GITHUB_OUTPUT
          fi

  test-batch:
    name: 🐣 Hatching (${{ matrix.firmware }} ${{ matrix.fstype }})
    needs: setup
    runs-on: self-hosted
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: 🚀 Trigger Incubator Remotely via SSH
        run: |
          # The runner connects to Proxmox via SSH, passes the variables, and runs the Go binary
          # PROXMOX_IP 192.168.1.2
          ssh -o StrictHostKeyChecking=no root@192.168.1.2 "FIRMWARE=${{ matrix.firmware }} FSTYPE=${{ matrix.fstype }} VMID=${{ matrix.vmid }} /usr/local/bin/incubator-go /var/lib/vz/template/iso/"

      - name: 📋 Collect Go Reports via SCP
        if: always() 
        run: |
          mkdir -p ./incubator-logs
          # Retrieve the Markdown file generated in Proxmox's root home directory
          scp -o StrictHostKeyChecking=no root@192.168.1.2:/root/incubator-summary-${{ matrix.firmware }}-${{ matrix.fstype }}.md ./incubator-logs/ || true

      - name: 📤 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incubator-go-reports-${{ matrix.firmware }}-${{ matrix.fstype }}
          path: ./incubator-logs/

  summary:
    name: 📊 Generate Summary Report
    needs: test-batch
    if: always()
    runs-on: self-hosted
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 🔨 Merge Markdown Tables
        run: |
          # Concatenate all retrieved tables into the GitHub step summary
          cat artifacts/incubator-go-reports-*/incubator-summary-*.md >> $GITHUB_STEP_SUMMARY