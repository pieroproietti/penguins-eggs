name: "🌋 testing The Furnace: Proxmox ISO Casting"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            vmid: 201
            ip: 192.168.1.201
          - distro: arch
            vmid: 202
            ip: 192.168.1.202
          #- distro: manjaro
          #  vmid: 203
          #  ip: 192.168.1.203
          - distro: fedora
            vmid: 204
            ip: 192.168.1.204
          #- distro: opensuse
          #  vmid: 205
          #  ip: 192.168.1.205
          - distro: alpine
            vmid: 206
            ip: 192.168.1.206
    
    steps:
    - name: Start Proxmox VM (furnace-${{ matrix.distro }})
      run: |
        echo "Ordino al nodo Proxmox di accendere la VM ${{ matrix.vmid }}..."
        # Nota: se usi root su proxmox, puoi fare direttamente ssh root@192.168.1.2 "qm start ${{ matrix.vmid }}"
        ssh -o StrictHostKeyChecking=no artisan@192.168.1.2 "echo 'evolution' | sudo -S qm start ${{ matrix.vmid }}"
        echo "Attendo 25 secondi per il boot e l'avvio della rete..."
        sleep 25

    - name: Fetch da GitHub
      run: |
        echo "Scarico il codice sulla VM ${{ matrix.ip }}..."
        ssh -o StrictHostKeyChecking=no artisan@${{ matrix.ip }} "rm -rf /home/artisan/oa-tools && git clone https://github.com/${{ github.repository }}.git /home/artisan/oa-tools && cd /home/artisan/oa-tools && git checkout ${{ github.sha }}"

    - name: Build, Kill & Remaster
      run: |
        echo "Lancio la build nativa e remasterizzo..."
        ssh -o StrictHostKeyChecking=no artisan@${{ matrix.ip }} "cd /home/artisan/oa-tools && make && echo 'evolution' | sudo -S ./coa/coa kill | sudo -S ./coa/coa remaster"

    - name: Estrazione ISO
      if: always()
      run: |
        echo "Recupero l'uovo appena deposto..."
        ssh -o StrictHostKeyChecking=no artisan@${{ matrix.ip }} "echo 'evolution' | sudo -S cat /home/eggs/egg*.iso" > ./egg-of-${{ matrix.distro }}.iso

    - name: Upload Artefatto
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro }}-egg
        path: ./egg-of-${{ matrix.distro }}.iso
        retention-days: 5

    - name: Stop Proxmox VM
      if: always()
      run: |
        echo "Ordino lo spegnimento della macchina..."
        ssh -o StrictHostKeyChecking=no artisan@${{ matrix.ip }} "echo 'evolution' | sudo -S poweroff" || true
