name: "🏭 Furnace: Arch"

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Seleziona la sorgente dei pacchetti'
        required: true
        default: 'artifacts'
        type: choice
        options:
          - 'artifacts'
          - 'release'

jobs:
  build:
    uses: ./.github/workflows/furnace-core.yml
    secrets: inherit
    with:
      source: ${{ inputs.source }}
      os: 'arch'
      vmid: 302
      snapshot: 'virgin'
      subnet: '192.168.1'
      artifact_name: 'penguins-eggs-arch'
      artifact_url: 'https://github.com/pieroproietti/penguins-eggs/releases/latest/download/penguins-eggs-arch.zip'
      prep_cmd: "sh -c 'pacman -Sy --noconfirm sshpass'"
      install_cmd: "pacman -U --noconfirm *.pkg.tar.zst"
      