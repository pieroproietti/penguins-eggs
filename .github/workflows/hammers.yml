name: "🔨 Hammers Matrix (Packaging)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    

jobs:
  hammer-build:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
          include:
          # ==========================================
          # 🏔️ ALPINE LINUX (La Vetta di Ghiaccio)
          # ==========================================
          - distro: alpine
            image: alpine:latest
            # Ora che il builder in Go sposta il file nella root, il pattern è semplice!
            pkg_pattern: "*.apk"
            prep_cmd: |
              apk update
              apk add go gcc musl-dev make git abuild sudo
              adduser -D artisan
              adduser artisan abuild
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                abuild-keygen -a -i -n
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                # make package fa tutto: compila, crea l'APKBUILD, esegue abuild e sposta il file
                make package
              "
            # L'installazione ora pesca direttamente dalla cartella di progetto
            install_cmd: apk add --allow-untrusted ./*.apk
              
          # ==========================================
          # 🏹 ARCH LINUX (Il Banco di Prova)
          # ==========================================
          - distro: arch
            image: archlinux:latest
            pkg_pattern: "*.pkg.tar.zst"
            prep_cmd: |
              pacman -Syu --noconfirm go gcc make git sudo fakeroot binutils
              useradd -m artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                make package
              "
            install_cmd: pacman -U --noconfirm *.pkg.tar.zst

          # ==========================================
          # 🏹 MANJARO
          # ==========================================
          - distro: manjaro
            image: manjarolinux/base:latest
            pkg_pattern: "*.pkg.tar.zst"
            prep_cmd: |
              pacman -Syu --noconfirm go gcc make git sudo fakeroot binutils
              useradd -m artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                make package
              "
            install_cmd: pacman -U --noconfirm *.pkg.tar.zst

          # ==========================================
          # 🌀 DEBIAN (Il Vecchio Saggio)
          # ==========================================
          - distro: debian
            image: debian:bookworm
            pkg_pattern: "*.deb"
            prep_cmd: |
              apt-get update
              apt-get install -y wget build-essential git sudo dpkg-dev
              wget https://go.dev/dl/go1.22.3.linux-amd64.tar.gz
              tar -C /usr/local -xzf go1.22.3.linux-amd64.tar.gz
              ln -s /usr/local/go/bin/go /usr/bin/go
              useradd -m -s /bin/bash artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                make package
              "
            install_cmd: apt-get install -y ./*.deb

          # ==========================================
          # 🎩 FEDORA
          # ==========================================
          - distro: fedora
            image: fedora:latest
            pkg_pattern: "*.rpm"
            prep_cmd: |
              dnf update -y
              dnf install -y gcc make git rpm-build golang sudo
              useradd -m -s /bin/bash artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                make package
              "
            install_cmd: dnf install -y ./*.rpm

          # ==========================================
          # 🦎 openSUSE (Tumbleweed)
          # ==========================================
          - distro: opensuse
            image: opensuse/tumbleweed
            pkg_pattern: "*.rpm"
            prep_cmd: |
              zypper -n refresh
              zypper -n install gcc make git rpm-build go sudo shadow
              useradd -m -s /bin/bash artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                make package
              "
            install_cmd: zypper -n --no-gpg-checks install ./*.rpm

    container:
      image: ${{ matrix.image }}

    steps:
      - name: 🧰 Allestimento attrezzi nella officina
        run: ${{ matrix.prep_cmd }}

      - name: 📥 Prelievo codice (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: ⚙️ Compilazione e Preparazione Sorgenti (oa & coa)
        run: |
          echo "🔓 Sblocco la repository per root..."
          git config --global --add safe.directory '*'
          echo "🔨 Compilo..."
          make

      - name: 📦 Generazione Pacchetto Nativo (${{ matrix.distro }})
        run: ${{ matrix.pack_cmd }}

      - name: 🚀 Installazione nel sistema vivo
        run: ${{ matrix.install_cmd }}

      # --------------------------------------------------------------------
      # ESTRAZIONE DEL BOTTINO LOCALE (Scaricabili separatamente)
      # --------------------------------------------------------------------
      - name: 🗄️ Prepara il pacchetto per l'esportazione
        run: |
          mkdir -p export
          cp ${{ matrix.pkg_pattern }} export/ || echo "⚠️ Nessun pacchetto trovato per questa esecuzione"

      - name: 📤 Pubblica il pacchetto ${{ matrix.distro }}
        uses: actions/upload-artifact@v4
        with:
          name: oa-tools-${{ matrix.distro }}
          path: export/
          retention-days: 7