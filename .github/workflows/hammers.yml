name: "🔨 Hammers Matrix (Compile & Pack)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  hammer-build:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # ==========================================
          # ⛰️ ALPINE (Il Buttafuori)
          # ==========================================
          - distro: alpine
            image: alpine:latest
            prep_cmd: |
              apk update
              apk add go gcc musl-dev make git abuild sudo
              # Alpine usa BusyBox, quindi la sintassi per gli utenti è diversa
              adduser -D artisan
              adduser artisan abuild
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                sudo abuild-keygen -a -i -n
                cd $GITHUB_WORKSPACE
                ./coa/coa tools build alpine
                # Andiamo nel cantiere temporaneo in /tmp
                cd /tmp/oa-alpine-build
                abuild -r
              "
                          # abuild non lascia il pacchetto qui, ma nella home di artisan!
            install_cmd: apk add --allow-untrusted /home/artisan/packages/*/*/*.apk

          # # ==========================================
          # # 🏹 ARCH LINUX (Il Banco di Prova)
          # # ==========================================
          # - distro: arch
          #   image: archlinux:latest
          #   prep_cmd: |
          #     pacman -Syu --noconfirm go gcc make git sudo fakeroot binutils
          #     useradd -m artisan
          #     echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          #   pack_cmd: |
          #     chown -R artisan:artisan .
          #     su - artisan -c "
          #       set -e
          #       cd $GITHUB_WORKSPACE
          #       ./coa/coa tools build arch
          #       makepkg -s --noconfirm
          #     "
          #   install_cmd: pacman -U --noconfirm *.pkg.tar.zst

          # # ==========================================
          # # 🏹 MANJARO
          # # ==========================================
          # - distro: manjaro
          #   image: manjarolinux/base:latest
          #   prep_cmd: |
          #     pacman -Syu --noconfirm go gcc make git sudo fakeroot binutils
          #     useradd -m artisan
          #     echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          #   pack_cmd: |
          #     chown -R artisan:artisan .
          #     su - artisan -c "
          #       set -e
          #       cd $GITHUB_WORKSPACE
          #       ./coa/coa tools build manjaro
          #       makepkg -s --noconfirm
          #     "
          #   install_cmd: pacman -U --noconfirm *.pkg.tar.zst

          # # ==========================================
          # # 🌀 DEBIAN (Il Classico)
          # # ==========================================
          # - distro: debian
          #   image: debian:bookworm
          #   prep_cmd: apt-get update && apt-get install -y golang build-essential git sudo dpkg-dev
          #   # Il tuo builder Go richiama già dpkg-deb nativamente e sputa il .deb nella root
          #   pack_cmd: echo "Pacchetto .deb già generato da coa nella root"
          #   install_cmd: apt-get install -y ./*.deb

          # # ==========================================
          # # 🎩 FEDORA & OPENSUSE (I RedHat-like)
          # # ==========================================
          # - distro: fedora
          #   image: fedora:latest
          #   prep_cmd: dnf install -y golang gcc make git rpm-build
          #   # Presumo che coa crei una cartella fedora-build con dentro il .spec
          #   pack_cmd: cd fedora-build && rpmbuild -ba oa-tools.spec --define "_topdir $PWD"
          #   install_cmd: dnf install -y RPMS/x86_64/*.rpm

          # - distro: opensuse
          #   image: opensuse/tumbleweed:latest
          #   prep_cmd: zypper --non-interactive install go gcc make git rpmbuild
          #   pack_cmd: cd opensuse-build && rpmbuild -ba oa-tools.spec --define "_topdir $PWD"
          #   install_cmd: zypper --non-interactive install RPMS/x86_64/*.rpm

    container:
      image: ${{ matrix.image }}

    steps:
      - name: 📥 Prelievo codice (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧰 Allestimento attrezzi nella officina
        run: ${{ matrix.prep_cmd }}

      - name: ⚙️ Compilazione e Preparazione Sorgenti (oa & coa)
        run: |
          echo "🔨 Compilo e preparo le cartelle di staging (es. alpine-build)..."
          make
          # non serve piu

      - name: 📦 Generazione Pacchetto Nativo (${{ matrix.distro }})
        run: ${{ matrix.pack_cmd }}

      - name: 🚀 Installazione nel sistema vivo
        run: ${{ matrix.install_cmd }}
        