name: "🔨 Hammers Matrix (Packaging)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    

jobs:
  hammer-build:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
          include:
          # ==========================================
          # 🏔️ ALPINE LINUX (La Vetta di Ghiaccio)
          # ==========================================
          - distro: alpine
            image: alpine:latest
            # Ora che il builder in Go sposta il file nella root, il pattern è semplice!
            pkg_pattern: "*.apk"
            prep_cmd: |
              apk update
              apk add go gcc musl-dev make git abuild sudo
              adduser -D artisan
              adduser artisan abuild
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                abuild-keygen -a -i -n
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                # make package fa tutto: compila, crea l'APKBUILD, esegue abuild e sposta il file
                make package
              "
            # L'installazione ora pesca direttamente dalla cartella di progetto
            install_cmd: apk add --allow-untrusted ./*.apk
              
          # ==========================================
          # 🏹 ARCH LINUX (Il Banco di Prova)
          # ==========================================
          - distro: arch
            image: archlinux:latest
            pkg_pattern: "*.pkg.tar.zst"
            prep_cmd: |
              pacman -Syu --noconfirm go gcc make git sudo fakeroot binutils
              useradd -m artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                make package
              "
            install_cmd: pacman -U --noconfirm *.pkg.tar.zst

          # ==========================================
          # 🏹 MANJARO
          # ==========================================
          - distro: manjaro
            image: manjarolinux/base:latest
            pkg_pattern: "*.pkg.tar.zst"
            prep_cmd: |
              pacman -Syu --noconfirm go gcc make git sudo fakeroot binutils
              useradd -m artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                make package
              "
            install_cmd: pacman -U --noconfirm *.pkg.tar.zst

          # ==========================================
          # 🌀 DEBIAN (Il Vecchio Saggio)
          # ==========================================
          - distro: debian
            image: debian:bookworm
            pkg_pattern: "*.deb"
            prep_cmd: |
              export DEBIAN_FRONTEND=noninteractive
              
              apt-get update
              
              # 2. Pre-configura console-setup e keyboard per evitare il blocco Dialog
              apt-get install -y debconf-utils
              
              # Usa questo invece di <<<
              echo "keyboard-configuration keyboard-configuration/layout select IT" | debconf-set-selections
              echo "keyboard-configuration keyboard-configuration/modelcode select pc105" | debconf-set-selections
              echo "console-setup console-setup/detect guess" | debconf-set-selections

              apt-get install -y wget build-essential git sudo dpkg-dev
              wget https://go.dev/dl/go1.22.3.linux-amd64.tar.gz
              tar -C /usr/local -xzf go1.22.3.linux-amd64.tar.gz
              ln -s /usr/local/go/bin/go /usr/bin/go
              useradd -m -s /bin/bash artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                make package
              "
            install_cmd: apt-get install -y ./*.deb

          # ==========================================
          # 🎩 FEDORA
          # ==========================================
          - distro: fedora
            image: fedora:latest
            pkg_pattern: "*.rpm"
            prep_cmd: |
              dnf update -y
              dnf install -y gcc make git rpm-build golang sudo
              useradd -m -s /bin/bash artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                make package
              "
            install_cmd: dnf install -y ./*.rpm

          # ==========================================
          # 🦎 openSUSE (Tumbleweed)
          # ==========================================
          - distro: opensuse
            image: opensuse/tumbleweed
            pkg_pattern: "*.rpm"
            prep_cmd: |
              zypper -n refresh
              zypper -n install gcc make git rpm-build go sudo shadow
              useradd -m -s /bin/bash artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                make package
              "
            install_cmd: zypper -n --no-gpg-checks install ./*.rpm

          # ==========================================
          # 🚀 DEBIAN RISC-V (The Cosmic Vineyard)
          # ==========================================
          - distro: debian-riscv64
            image: ubuntu:22.04
            pkg_pattern: "*.deb"
            
            prep_cmd: |
              export DEBIAN_FRONTEND=noninteractive
              
              # 1. LA MAGIA MULTI-ARCH: Aggiungiamo anche gli aggiornamenti per allineare le versioni!
              dpkg --add-architecture riscv64
              sed -i 's/^deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
              
              # Inseriamo il repo base, gli updates e le patch di sicurezza per RISC-V
              cat <<EOF > /etc/apt/sources.list.d/riscv64.list
              deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
              deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
              deb [arch=riscv64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
              EOF
              
              apt-get update
              apt-get install -y debconf-utils
              echo "keyboard-configuration keyboard-configuration/layout select IT" | debconf-set-selections
              echo "keyboard-configuration keyboard-configuration/modelcode select pc105" | debconf-set-selections
              echo "console-setup console-setup/detect guess" | debconf-set-selections
              
              # 2. Toolchain + Emulatore + libcrypt nativa RISC-V (ora le versioni coincideranno!)
              apt-get install -y wget build-essential git sudo dpkg-dev gcc-riscv64-linux-gnu qemu-user-static binfmt-support libcrypt-dev:riscv64
              
              # Scarichiamo il Go per x86_64
              wget -q https://go.dev/dl/go1.22.3.linux-amd64.tar.gz
              tar -C /usr/local -xzf go1.22.3.linux-amd64.tar.gz
              ln -s /usr/local/go/bin/go /usr/bin/go
              
              useradd -m -s /bin/bash artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                
                # 🧹 LA MAGIA DELLA SCOPA
                make clean
                
                # LA MAGIA BLINDATA
                make package GOOS=linux GOARCH=riscv64 CC=riscv64-linux-gnu-gcc RUNNER=qemu-riscv64-static
              "
            install_cmd: echo "✅ Pacchetto RISC-V generato. Salto il test di installazione sul runner x86_64."

          # ==========================================
          # 🍓 DEBIAN ARM64 (Raspberry Pi & Oracle Cloud)
          # ==========================================
          - distro: debian-arm64
            image: ubuntu:22.04
            pkg_pattern: "*.deb"
            
            prep_cmd: |
              export DEBIAN_FRONTEND=noninteractive
              
              # 1. LA MAGIA MULTI-ARCH: Aggiungiamo l'architettura ARM64
              dpkg --add-architecture arm64
              sed -i 's/^deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
              
              # Inseriamo il repo base, gli updates e le patch di sicurezza per ARM64
              cat <<EOF > /etc/apt/sources.list.d/arm64.list
              deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
              deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
              deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
              EOF
              
              apt-get update
              apt-get install -y debconf-utils
              echo "keyboard-configuration keyboard-configuration/layout select IT" | debconf-set-selections
              echo "keyboard-configuration keyboard-configuration/modelcode select pc105" | debconf-set-selections
              echo "console-setup console-setup/detect guess" | debconf-set-selections
              
              # 2. Toolchain + Emulatore + libcrypt nativa ARM64
              apt-get install -y wget build-essential git sudo dpkg-dev gcc-aarch64-linux-gnu qemu-user-static binfmt-support libcrypt-dev:arm64
              
              # Scarichiamo il Go per x86_64
              wget -q https://go.dev/dl/go1.22.3.linux-amd64.tar.gz
              tar -C /usr/local -xzf go1.22.3.linux-amd64.tar.gz
              ln -s /usr/local/go/bin/go /usr/bin/go
              
              useradd -m -s /bin/bash artisan
              echo "artisan ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            pack_cmd: |
              chown -R artisan:artisan .
              su - artisan -c "
                set -e
                cd $GITHUB_WORKSPACE
                git config --global --add safe.directory '*'
                
                # 🧹 LA MAGIA DELLA SCOPA
                make clean
                
                # LA MAGIA BLINDATA PER ARM64
                make package GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc RUNNER=qemu-aarch64-static
              "
            install_cmd: echo "✅ Pacchetto ARM64 generato. Salto il test di installazione sul runner x86_64."
            
    container:
      image: ${{ matrix.image }}

    steps:
      - name: 🧰 Tool setup in the workshop
        run: ${{ matrix.prep_cmd }}

      - name: 📥 Code Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: ⚙️ Compile & Stage Sources (oa & coa)
        run: |
          echo "🔓 Sblocco la repository per root..."
          git config --global --add safe.directory '*'
          echo "🔨 Compilo..."
          make

      - name: 📦 Create Native Package (${{ matrix.distro }})
        run: ${{ matrix.pack_cmd }}

      - name: 🚀 Install into Live Environment
        run: ${{ matrix.install_cmd }}

      # --------------------------------------------------------------------
      # ESTRAZIONE DEL BOTTINO LOCALE (Scaricabili separatamente)
      # --------------------------------------------------------------------
      - name: 🗄️ Package Export Preparation
        run: |
          mkdir -p export
          cp ${{ matrix.pkg_pattern }} export/ || echo "⚠️ Nessun pacchetto trovato per questa esecuzione"

      - name: 📤 Publish Package as Artifact ${{ matrix.distro }}
        uses: actions/upload-artifact@v4
        with:
          name: penguins-eggs-${{ matrix.distro }}
          path: export/
          retention-days: 7

