name: Mirror to OpenOS-Project-OSP

on:
  push:
    branches: ["**"]
    tags: ["**"]
  schedule:
    # Hourly sync to catch any missed push events
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout full history (detached HEAD)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          # Detached HEAD avoids "refusing to fetch into checked-out branch"
          ref: ${{ github.sha }}

      - name: Fetch all branches and tags
        run: git fetch --all --tags --prune

      - name: Push mirror to OpenOS-Project-OSP
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${MIRROR_TOKEN}@github.com" > ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
          git remote add mirror \
            "https://x-access-token:${MIRROR_TOKEN}@github.com/OpenOS-Project-OSP/penguins-eggs.git"
          git push mirror 'refs/remotes/origin/*:refs/heads/*' --force
          git push mirror --tags --force
          rm -f ~/.git-credentials
