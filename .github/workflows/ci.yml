name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: pytest / Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check lkm/

      - name: Test
        run: pytest --tb=short --cov=lkm --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  test-alpine:
    name: pytest / Python 3.12 / Alpine
    runs-on: ubuntu-latest
    container: python:3.12-alpine

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: apk add --no-cache gcc musl-dev linux-headers

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest --tb=short

  type-check:
    name: mypy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Type check
        run: mypy lkm/ --ignore-missing-imports
