# ========================================================
# NOME: Publish Packages
# DESCRIZIONE: Scarica gli archivi zip dalla release corrente,
#              li estrae e pubblica i pacchetti nella repository VPS.
# ========================================================
name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag della release (es. v0.8.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  # ========================================================
  # 1.0 JOB DI PUBBLICAZIONE DEBIAN
  # runs-on: self-hosted (runner vps) CON CONTAINER
  # ========================================================
  publish-debian:
    runs-on: self-hosted
    container:
      image: debian:13
      volumes:
        - /var/www/html/repos/deb:/mnt/deb-repo # HostPath:ContainerPath
    
    steps:
      - name: 1. Install Dependencies
        run: |
          apt-get update
          apt-get install -y apt-utils gnupg dpkg dpkg-dev curl unzip
          # Installiamo GitHub CLI (gh)
          curl -sL https://github.com/cli/cli/releases/download/v2.47.0/gh_2.47.0_linux_amd64.tar.gz | tar -xz -C /usr/local/bin --strip-components=2 gh_2.47.0_linux_amd64/bin/gh

      - name: 2. Import GPG Key
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "${{ secrets.GPG_SIGNING_KEY }}" | gpg --import --batch
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 -o /dev/null -s /dev/null

      - name: 3. Fetch & Extract Debian packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Scaricamento zip debian versione ${{ inputs.release_tag }}..."
          mkdir -p /tmp/packages
          gh release download ${{ inputs.release_tag }} --repo ${{ github.repository }} --pattern "*-debian.zip" --dir /tmp/packages || echo "Nessun zip trovato"
          
          echo "Estrazione pacchetti..."
          unzip -o /tmp/packages/*-debian.zip -d /tmp/packages/ 2>/dev/null || true
          cp /tmp/packages/*.deb /mnt/deb-repo/pool/main/ 2>/dev/null || true

      - name: 4. Update Debian Repo (NO Pruning)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        working-directory: /mnt/deb-repo
        run: |
          set -e
          echo "--- DEBIAN: Genero file Packages ---"
          dpkg-scanpackages -a amd64 pool/main > dists/stable/main/binary-amd64/Packages
          gzip -9c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz
          
          echo "--- DEBIAN: Genero file Release ---"
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Penguins-Eggs" \
            -o APT::FTPArchive::Release::Label="Penguins-Eggs" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64 i386" \
            -o APT::FTPArchive::Release::Components="main" \
            release dists/stable > dists/stable/Release
            
          echo "--- DEBIAN: Firmo file Release (creo InRelease) ---"
          gpg --default-key "$GPG_KEY_ID" \
              --clearsign \
              -o dists/stable/InRelease \
              --batch --yes --passphrase "$GPG_PASSPHRASE" \
              dists/stable/Release

  # ========================================================
  # 2.0 JOB DI PUBBLICAZIONE ALTRE DISTRO
  # runs-on: self-hosted (runner vps) 
  # ========================================================
  publish-others:
    runs-on: self-hosted 
    container:
      image: archlinux
      volumes:
        - /var/www/html/repos:/mnt/repos # HostPath:ContainerPath
    
    steps:
      - name: 1. Install Dependencies
        run: |
          pacman-key --init && pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm pacman-contrib gnupg createrepo_c apk-tools github-cli unzip

      - name: 2. Fetch, Extract & Distribute packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Scaricamento archivi zip versione ${{ inputs.release_tag }}..."
          mkdir -p /tmp/packages
          gh release download ${{ inputs.release_tag }} --repo ${{ github.repository }} --pattern "*.zip" --dir /tmp/packages || echo "Nessun file zip trovato"
          
          echo "Estrazione e smistamento dei pacchetti nelle rispettive cartelle..."
          unzip -o /tmp/packages/*-alpine.zip -d /tmp/packages/alpine/ 2>/dev/null || true
          unzip -o /tmp/packages/*-arch.zip -d /tmp/packages/arch/ 2>/dev/null || true
          unzip -o /tmp/packages/*-manjaro.zip -d /tmp/packages/manjaro/ 2>/dev/null || true
          unzip -o /tmp/packages/*-fedora.zip -d /tmp/packages/fedora/ 2>/dev/null || true
          unzip -o /tmp/packages/*-opensuse.zip -d /tmp/packages/opensuse/ 2>/dev/null || true
          
          echo "Copia nei percorsi del repository..."
          cp /tmp/packages/alpine/*.apk /mnt/repos/alpine/ 2>/dev/null || true
          cp /tmp/packages/arch/*.pkg.tar.zst /mnt/repos/arch/ 2>/dev/null || true
          cp /tmp/packages/manjaro/*.pkg.tar.zst /mnt/repos/manjaro/ 2>/dev/null || true
          cp /tmp/packages/fedora/*.rpm /mnt/repos/rpm/fedora/42/ 2>/dev/null || true
          cp /tmp/packages/opensuse/*.rpm /mnt/repos/rpm/opensuse/leap/ 2>/dev/null || true

      - name: 3. Import GPG Key
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_SIGNING_KEY" | gpg --import --batch
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 -o /dev/null -s /dev/null

      - name: 4. Update Alpine Repo (WITH Pruning)
        env:
          ALPINE_SIGNING_KEY_PUB: ${{ secrets.ALPINE_SIGNING_KEY_PUB }}
        run: |
          set -ex
          cd /mnt/repos/alpine
          echo '--- ALPINE: Cleaning old packages ---'
          PKG_BASES=$(find . -maxdepth 1 -name '*.apk' -exec basename {} \; | sed -E 's/(.*)-[0-9]+\..*/\1/' | sort -u)
          for base in $PKG_BASES; do
            ls ${base}-[0-9]*.apk 2>/dev/null | sort -V | head -n -1 | xargs -r rm -vf
          done
          rm -f APKINDEX.tar.gz
          apk index -o APKINDEX.tar.gz *.apk --allow-untrusted
          echo "$ALPINE_SIGNING_KEY_PUB" > penguins-eggs.rsa.pub

      - name: 5. Update Arch Repo (WITH Pruning)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -ex
          cd /mnt/repos/arch
          echo '--- ARCH: Cleaning old packages ---'
          PKG_BASES=$(find . -maxdepth 1 -name '*.pkg.tar.zst' -exec basename {} \; | sed -E 's/(.*)-[0-9]+\..*/\1/' | sort -u)
          for base in $PKG_BASES; do
            ls ${base}-*.pkg.tar.zst 2>/dev/null | sort -V | head -n -1 | xargs -r rm -vf
            ls ${base}-*.pkg.tar.zst.sig 2>/dev/null | sort -V | head -n -1 | xargs -r rm -vf
          done
          rm -f penguins-eggs.db.tar.gz penguins-eggs.files.tar.gz
          repo-add --sign --key "$GPG_KEY_ID" penguins-eggs.db.tar.gz *.pkg.tar.zst

      - name: 6. Update RPM Repos
        run: |
          set -e
          echo "--- RPM: Re-indexing ---"
          cd /mnt/repos/rpm/fedora/42; rm -rf repodata; createrepo_c .;
          cd /mnt/repos/rpm/opensuse/leap; rm -rf repodata; createrepo_c .;

      - name: 7. Update Manjaro Repo (WITH Pruning)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -ex
          cd /mnt/repos/manjaro
          echo '--- MANJARO: Cleaning old packages ---'
          PKG_BASES=$(find . -maxdepth 1 -name '*.pkg.tar.zst' -exec basename {} \; | sed -E 's/(.*)-[0-9]+\..*/\1/' | sort -u)
          for base in $PKG_BASES; do
            ls ${base}-*.pkg.tar.zst 2>/dev/null | sort -V | head -n -1 | xargs -r rm -vf
            ls ${base}-*.pkg.tar.zst.sig 2>/dev/null | sort -V | head -n -1 | xargs -r rm -vf
          done
          rm -f penguins-eggs.db.tar.gz penguins-eggs.files.tar.gz
          repo-add --sign --key "$GPG_KEY_ID" penguins-eggs.db.tar.gz *.pkg.tar.zst