name: debian

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v6

    - name: Esegui Build e Test su Debian
      run: |
        ./github-ci-roots/debian/do-debian.sh

    - name: Recupera la ISO dalla VM
      run: |
        # Usiamo il metodo cat per bypassare i permessi di 9p
        vagrant ssh default -c "cat ~/*.iso" > ./github-ci-roots/debian/egg-of-debian.iso

    - name: Salva la ISO generata come artefatto
      uses: actions/upload-artifact@v4
      with:
        name: debian-13-egg
        path: ./github-ci-roots/debian/*.iso
        retention-days: 5