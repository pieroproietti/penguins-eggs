name: CI Matrix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [arch, debian]
    
    steps:
    - uses: actions/checkout@v6

    - name: Prepara ambiente (Vagrant & Libvirt)
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils libvirt-dev build-essential ruby-dev
        
        # 1. Installiamo il plugin (ormai lo sai fare)
        vagrant plugin install vagrant-libvirt
        
        # 2. SE IL RUNNER DICE "command not found", FORZIAMO IL PATH
        # Troviamo dove è nascosto vagrant
        which vagrant || echo "Vagrant non trovato nel path standard"
        
        # Se è in /usr/local/bin/vagrant, assicuriamoci che sia nel path
        export PATH=$PATH:/usr/local/bin
        vagrant --version

    - name: Build e Test
      run: |
        newgrp libvirt <<EOF
          ./github-ci-roots/${{ matrix.distro }}/do-${{ matrix.distro }}.sh
        EOF

    - name: Recupera uovo
      run: |
        newgrp libvirt <<EOF
          vagrant ssh ${{ matrix.distro }} -c "cat ~/*.iso" > ./github-ci-roots/${{ matrix.distro }}/egg-of-${{ matrix.distro }}.iso
        EOF

    - name: Salva artefatto
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro }}-egg
        path: ./github-ci-roots/${{ matrix.distro }}/*.iso
        retention-days: 5