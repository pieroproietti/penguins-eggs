name: Proxmox Native CI (Debian & Arch)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            vmid: 201
            ip: 192.168.1.201
          - distro: arch
            vmid: 202
            ip: 192.168.1.202
    
    steps:
    - name: Start Proxmox VM (${{ matrix.distro }})
      run: |
        echo "Accendo la macchina ${{ matrix.vmid }}..."
        p4start ${{ matrix.vmid }}
        sleep 20 # Diamo tempo alla rete e a SSH di svegliarsi

    - name: Fetch da GitHub
      run: |
        echo "Scarico il codice sulla VM ${{ matrix.vmid }}..."
        ssh -o StrictHostKeyChecking=no artisan@${{ matrix.ip }} "rm -rf /home/artisan/oa-tools && git clone https://github.com/${{ github.repository }}.git /home/artisan/oa-tools && cd /home/artisan/oa-tools && git checkout ${{ github.sha }}"

    - name: Build & Remaster
      run: |
        echo "Lancio la build nativa e remasterizzo..."
        ssh -o StrictHostKeyChecking=no artisan@${{ matrix.ip }} "cd /home/artisan/oa-tools && make && echo 'live' | sudo -S ./coa/coa remaster"

    - name: Estrazione ISO
      if: always()
      run: |
        echo "Recupero l'uovo appena deposto..."
        ssh -o StrictHostKeyChecking=no artisan@${{ matrix.ip }} "echo 'live' | sudo -S cat /home/eggs/egg*.iso" > ./egg-of-${{ matrix.distro }}.iso

    - name: Upload Artefatto
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro }}-egg
        path: ./egg-of-${{ matrix.distro }}.iso
        retention-days: 5

    - name: Stop Proxmox VM
      if: always()
      run: |
        echo "Spengo la macchina ${{ matrix.vmid }}..."
        ssh -o StrictHostKeyChecking=no artisan@${{ matrix.ip }} "echo 'live' | sudo -S poweroff" || true