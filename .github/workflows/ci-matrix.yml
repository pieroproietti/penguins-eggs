name: CI Matrix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # Torniamo a latest, VirtualBox non ha problemi qui
    strategy:
      fail-fast: false
      matrix:
        distro: [arch, debian]
    
    steps:
    - uses: actions/checkout@v6

    - name: Prepara ambiente (Il Carro Armato VirtualBox)
      run: |
        # 1. Installiamo VirtualBox
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y virtualbox wget curl

        # 2. Spegnimento KVM (La mossa di gnuhub per evitare conflitti)
        echo "=== Spegnimento KVM per evitare conflitti con VirtualBox ==="
        sudo systemctl stop libvirtd || true
        sudo systemctl stop virtlogd || true
        sudo modprobe -r kvm_amd || true
        sudo modprobe -r kvm_intel || true
        sudo modprobe -r kvm || true

        # 3. Installiamo Vagrant pulito da HashiCorp (niente plugin strani)
        VAGRANT_VERSION="2.4.9"
        wget -q https://releases.hashicorp.com/vagrant/${VAGRANT_VERSION}/vagrant_${VAGRANT_VERSION}-1_amd64.deb
        sudo dpkg -i vagrant_${VAGRANT_VERSION}-1_amd64.deb

    - name: Build e Test
      run: |
        vagrant up ${{ matrix.distro }} --provider=virtualbox
        ./github-ci-roots/${{ matrix.distro }}/do-${{ matrix.distro }}.sh

    - name: Estrazione ISO
      if: always()
      run: |
        vagrant ssh ${{ matrix.distro }} -c "cat ~/egg.iso" > ./github-ci-roots/${{ matrix.distro }}/egg-of-${{ matrix.distro }}.iso

    - name: Salva artefatto
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro }}-egg
        path: ./github-ci-roots/${{ matrix.distro }}/*.iso
        retention-days: 5
