name: CI Matrix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [arch, debian]
    
    steps:
    - uses: actions/checkout@v6

    - name: Prepara ambiente (Veloce)
      run: |
        sudo apt-get update
        # Installiamo TUTTO il necessario per la compilazione in un colpo solo
        sudo apt-get install -y \
          build-essential \
          libvirt-dev \
          ruby-dev \
          libxml2-dev \
          libxslt1-dev \
          pkg-config
        
        # Installiamo vagrant
        wget -q https://releases.hashicorp.com/vagrant/2.4.9/vagrant_2.4.9-1_amd64.deb
        sudo dpkg -i vagrant_2.4.9-1_amd64.deb
        
        # E ora il trucco: usiamo --local per vedere se riusciamo ad accelerare 
        # o se riusciamo a far sì che il processo finisca in tempo
        /usr/bin/vagrant plugin install vagrant-libvirt    

    - name: Build e Test
      run: |
        newgrp libvirt <<EOF
          ./github-ci-roots/${{ matrix.distro }}/do-${{ matrix.distro }}.sh
        EOF

    - name: Recupera uovo
      run: |
        newgrp libvirt <<EOF
          vagrant ssh ${{ matrix.distro }} -c "cat ~/*.iso" > ./github-ci-roots/${{ matrix.distro }}/egg-of-${{ matrix.distro }}.iso
        EOF

    - name: Salva artefatto
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro }}-egg
        path: ./github-ci-roots/${{ matrix.distro }}/*.iso
        retention-days: 5