name: CI Matrix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Fondamentale: qui vagrant è ancora nei repository ufficiali APT
    strategy:
      fail-fast: false    # Se Arch fallisce, Debian continua (e viceversa), così leggi i log di entrambi
      matrix:
        distro: [arch, debian]
    
    steps:
    - uses: actions/checkout@v6

    - name: Prepara ambiente (Metodo Nativo e Silenziato)
      run: |
        sudo apt-get update
        
        # 1. Installazione silenziosa e velocissima (--no-install-recommends e DEBIAN_FRONTEND)
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          qemu-kvm \
          libvirt-daemon-system \
          libvirt-clients \
          bridge-utils \
          vagrant \
          vagrant-libvirt
        
        # 2. Sblocco permessi QEMU per evitare il "Permission denied" sulle cartelle condivise (9p)
        echo 'user = "root"' | sudo tee -a /etc/libvirt/qemu.conf
        echo 'group = "root"' | sudo tee -a /etc/libvirt/qemu.conf
        echo 'security_driver = "none"' | sudo tee -a /etc/libvirt/qemu.conf
        
        # 3. Riavvio dei servizi per applicare le modifiche a qemu.conf
        sudo systemctl restart libvirtd
        sudo systemctl enable libvirtd
        
        # 4. Aggiunta dell'utente runner al gruppo libvirt
        sudo usermod -a -G libvirt $USER

    - name: Build e Test
      run: |
        # Esecuzione nel gruppo libvirt per evitare problemi di socket
        sg libvirt -c "./github-ci-roots/${{ matrix.distro }}/do-${{ matrix.distro }}.sh"

    - name: Estrazione ISO
      if: always() # Salva l'uovo anche se lo step precedente fallisce
      run: |
        sg libvirt -c "/usr/bin/vagrant ssh ${{ matrix.distro }} -c 'cat ~/egg.iso' > ./github-ci-roots/${{ matrix.distro }}/egg-of-${{ matrix.distro }}.iso"

    - name: Salva artefatto
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro }}-egg
        path: ./github-ci-roots/${{ matrix.distro }}/*.iso
        retention-days: 5
        