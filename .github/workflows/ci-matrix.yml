name: CI Matrix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [arch, debian]
    
    steps:
    - uses: actions/checkout@v6

    - name: Prepara ambiente (Installazione Forza)
      run: |
        # 1. Aggiorna e installa dipendenze base
        sudo apt-get update
        sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils libvirt-dev build-essential ruby-dev

        # 2. Scarica e installa Vagrant pulito
        wget -q https://releases.hashicorp.com/vagrant/2.4.9/vagrant_2.4.9-1_amd64.deb
        sudo dpkg -i vagrant_2.4.9-1_amd64.deb
        
        # 3. Verifica immediata: deve rispondere la versione, altrimenti falliamo subito
        /usr/bin/vagrant --version
        
        # 4. Installa il plugin
        /usr/bin/vagrant plugin install vagrant-libvirt
        

    - name: Build e Test
      run: |
        newgrp libvirt <<EOF
          ./github-ci-roots/${{ matrix.distro }}/do-${{ matrix.distro }}.sh
        EOF

    - name: Recupera uovo
      run: |
        newgrp libvirt <<EOF
          vagrant ssh ${{ matrix.distro }} -c "cat ~/*.iso" > ./github-ci-roots/${{ matrix.distro }}/egg-of-${{ matrix.distro }}.iso
        EOF

    - name: Salva artefatto
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro }}-egg
        path: ./github-ci-roots/${{ matrix.distro }}/*.iso
        retention-days: 5