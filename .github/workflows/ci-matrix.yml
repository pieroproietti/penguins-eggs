name: CI Matrix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [arch, debian]
    
    steps:
    - uses: actions/checkout@v6


    - name: Prepara ambiente (Vagrant & Libvirt)
      run: |
        sudo apt-get update
        # Aggiungiamo esplicitamente libvirt-dev, build-essential e ruby-dev
        # Ruby-dev è fondamentale perché il plugin di Vagrant è scritto in Ruby
        sudo apt-get install -y \
          qemu-kvm \
          libvirt-daemon-system \
          libvirt-clients \
          bridge-utils \
          libvirt-dev \
          build-essential \
          ruby-dev \
          wget
        
        wget -q https://releases.hashicorp.com/vagrant/2.4.9/vagrant_2.4.9-1_amd64.deb
        sudo dpkg -i vagrant_2.4.9-1_amd64.deb
        
        # Ora che abbiamo gli header, il plugin si compilerà felicemente
        vagrant plugin install vagrant-libvirt

    - name: Build e Test
      run: |
        newgrp libvirt <<EOF
          ./github-ci-roots/${{ matrix.distro }}/do-${{ matrix.distro }}.sh
        EOF

    - name: Recupera uovo
      run: |
        newgrp libvirt <<EOF
          vagrant ssh ${{ matrix.distro }} -c "cat ~/*.iso" > ./github-ci-roots/${{ matrix.distro }}/egg-of-${{ matrix.distro }}.iso
        EOF

    - name: Salva artefatto
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.distro }}-egg
        path: ./github-ci-roots/${{ matrix.distro }}/*.iso
        retention-days: 5