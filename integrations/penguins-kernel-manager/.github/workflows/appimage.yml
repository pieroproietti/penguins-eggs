name: AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget libfuse2 imagemagick python3-pip

      - name: Build AppImage
        env:
          ARCH: ${{ matrix.arch }}
          OUT_DIR: ${{ github.workspace }}/dist
        run: bash pkg/appimage/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LKM-AppImage-${{ matrix.arch }}
          path: dist/LKM-*.AppImage
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: LKM-AppImage-*
          merge-multiple: true
          path: dist/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LKM-*.AppImage
