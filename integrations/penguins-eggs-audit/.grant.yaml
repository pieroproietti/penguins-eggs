# grant license policy for penguins-eggs-audit
# Checked in CI via: grant check --config .grant.yaml dir:.
# See: https://github.com/anchore/grant

allow:
  # Permissive
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - 0BSD
  - Unlicense
  - CC0-1.0
  - BlueOak-1.0.0
  - Python-2.0

  # Weak copyleft (source modifications must be shared, but linking is fine)
  - LGPL-2.1
  - LGPL-2.1-only
  - LGPL-2.1-or-later
  - MPL-2.0

# Deny packages with no detected license (default: true)
require-license: false

# Allow non-SPDX license strings (default: false)
require-known-license: false
