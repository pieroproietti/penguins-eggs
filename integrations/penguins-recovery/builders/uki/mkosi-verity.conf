# mkosi-verity.conf
#
# mkosi configuration for building a dm-verity verified, Secure Boot-signed
# recovery UKI via the existing builders/uki/ pipeline.
#
# Extends the base mkosi build with:
#   --verity=yes          dm-verity hash tree appended to rootfs image
#   --secure-boot=yes     UKI signed with Secure Boot keys
#   --format=uki          Output is a signed EFI binary
#
# Usage:
#   mkosi --config mkosi-verity.conf build
#   make uki-verity
#   make uki-verity SECUREBOOT=1 KEY=/etc/keys/db.key CERT=/etc/keys/db.crt
#
# Requires mkosi >= v16 (systemd/mkosi).
# Install: pipx install git+https://github.com/systemd/mkosi.git

[Distribution]
# Inherit from base mkosi.conf — override here if needed
# Distribution=arch
# Release=rolling

[Output]
Format=uki
OutputDirectory=mkosi.output.verity
ImageId=penguins-recovery-verified

[Content]
# Recovery tools included in the UKI initrd
Packages=
        btrfs-progs
        erofs-utils
        cryptsetup
        squashfs-tools
        dosfstools
        e2fsprogs
        parted
        util-linux
        bash
        coreutils

[Validation]
Verity=yes
SecureBoot=yes
# Override key/cert paths via --secure-boot-key / --secure-boot-certificate
# or set here:
# SecureBootKey=/etc/verity_squash_root/db.key
# SecureBootCertificate=/etc/verity_squash_root/db.crt

[Host]
KernelCommandLine=rd.emergency=reboot systemd.unit=rescue.target console=tty0
