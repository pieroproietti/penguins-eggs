# rpi4 — Raspberry Pi 4B / Pi 400 (openFyde rpi4-openfyde)
# Suitable for: RPi4-specific arm64 container images
# NOT suitable as a generic container base — contains BCM2711 firmware.
BOARD=rpi4-openfyde
ARCH=arm64
CHOST=aarch64-cros-linux-gnu
BOOTSTRAP_ARCH=arm64
BOOTSTRAP_URL=https://github.com/debuerreotype/docker-debian-artifacts/releases/download/dist-arm64v8/debian-bookworm-slim.tar.xz
BOOTSTRAP_STRIP=0
PROFILE_PATH=default/linux/arm64/10.0/chromeos
GCC_USE_FLAGS=""
OVERLAY_REPO=https://github.com/openFyde/overlay-rpi4-openfyde
OVERLAY_BASE_REPO=https://github.com/openFyde/overlay-rpi4-openfyde-base
OVERLAY_BRANCH=main
PATCHES_REPO=https://github.com/openFyde/project-openfyde-patches
PATCHES_BRANCH=main
EXTRA_PACKAGES="chromeos-base/chromeos-bsp-rpi4-openfyde"
