# rk3588 — Rockchip RK3588/RK3588S/RK3588J family (openFyde foundation-rk3588)
# Covers: ROCK 5B, Orange Pi 5/5B/5 Plus, Firefly Station PC, Firefly ITX-3588J
# NOT suitable as a generic container base — contains Mali GPU + Rockchip firmware.
BOARD=rock5b-openfyde
ARCH=arm64
CHOST=aarch64-cros-linux-gnu
BOOTSTRAP_ARCH=arm64
BOOTSTRAP_URL=https://github.com/debuerreotype/docker-debian-artifacts/releases/download/dist-arm64v8/debian-bookworm-slim.tar.xz
BOOTSTRAP_STRIP=0
PROFILE_PATH=default/linux/arm64/10.0/chromeos
GCC_USE_FLAGS=""
FOUNDATION_REPO=https://github.com/openFyde/foundation-rk3588
FOUNDATION_BRANCH=r120-dev
OVERLAY_REPO=https://github.com/openFyde/overlay-rock5b-openfyde
OVERLAY_BASE_REPO=https://github.com/openFyde/overlay-rock5b-openfyde-base
OVERLAY_BRANCH=main
KERNEL_REPO=https://github.com/openFyde/kernel-rockchip_6
KERNEL_BRANCH=main
PATCHES_REPO=https://github.com/openFyde/project-openfyde-patches
PATCHES_BRANCH=main
EXTRA_PACKAGES="chromeos-base/chromeos-bsp-rock5b-openfyde"
