# openSUSE Tumbleweed container + VM images
# Architectures: amd64, arm64
# Release: current (rolling)
# Init: systemd
image:
  distribution: opensuse
  release: tumbleweed
  architecture: amd64
  variant: default
  name: "{{ image.distribution }}-{{ image.release }}-{{ image.variant }}-{{ image.serial }}"
  description: "openSUSE {{ image.release }} {{ image.architecture }}"

source:
  downloader: opensuse-http
  url: https://download.opensuse.org/tumbleweed/appliances/

targets:
  lxc:
    create_message: |
      You just created an openSUSE Tumbleweed container.
    config:
      - type: all
        after: 4
        content: |-
          lxc.include = LXC_TEMPLATE_CONFIG/common.conf
      - type: user
        after: 4
        content: |-
          lxc.include = LXC_TEMPLATE_CONFIG/userns.conf

files:
  - path: /etc/hostname
    generator: hostname

  - path: /etc/hosts
    generator: hosts

  - path: /etc/machine-id
    generator: dump

  - path: /etc/systemd/network/eth0.network
    generator: dump
    content: |-
      [Match]
      Name=eth0

      [Network]
      DHCP=ipv4
    types:
      - vm

packages:
  manager: zypper
  update: true
  cleanup: true
  sets:
    - packages:
        - curl
        - git
        - openssh-clients
        - sudo
        - vim
      action: install

actions:
  - trigger: post-packages
    action: |-
      #!/bin/sh
      set -eux
      systemctl enable systemd-networkd || true
      zypper clean -a

mappings:
  architecture_map: opensuse
