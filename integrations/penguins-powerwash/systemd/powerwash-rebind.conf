# /etc/powerwash/rebind-devices.conf
#
# List sysfs BUS IDs of devices to rebind after resume from sleep.
# One BUS ID per line. Lines starting with # are ignored.
#
# Find BUS IDs with:
#   powerwash hardware list
#   lspci -D | grep USB
#   lsusb -v | grep -i 'bus\|device'
#
# Examples:
#   0000:00:14.0    # USB 3.0 xHCI controller
#   0000:01:00.0    # GPU
#   1-1.2           # USB device at port 1.2
#
# Uncomment and edit the lines below:
# 0000:00:14.0
