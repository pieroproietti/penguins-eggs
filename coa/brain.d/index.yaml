# Mappatura: a quale file .yaml corrisponde ogni ID o ID_LIKE
distributions:
  - id: "debian"
    like: [
      "abellha",
      "devuan", 
      "kali", 
      "linuxmint", 
      "pop", 
      "quirinux", 
      "ubuntu", 
      ]
    file: "debian.bash.tmpl"
  
  - id: "arch"
    like: [
      "cachyos",
      "endeavouros",
      "garuda",
      "rebornos"
      ]
    file: "arch-family.bash.tmpl"

  - id: "manjaro"
    like: [
      "bigcommunity", 
      "biglinux",
      ]
    file: "arch-family.bash.tmpl"

  - id: "fedora"
    like: ["nobara"]
    file: "fedora.bash.tmpl"

  - id: "opensuse"
    like: [
      "opensuse-slowroll",
      "opensuse-tumbleweed", 
      "suse", 
      ]
    file: "opensuse.bash.tmpl"

  - id: "alpine"
    like: []
    file: "alpine.bash.tmpl"
