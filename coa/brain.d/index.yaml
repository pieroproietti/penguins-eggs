# Mappatura: a quale file .yaml corrisponde ogni ID o ID_LIKE
distributions:
  - id: "debian"
    like: ["ubuntu", "linuxmint", "kali", "pop", "devuan", "quirinux"]
    file: "debian.bash.tmpl"
  
  - id: "arch"
    like: ["endeavouros", "cachyos", "garuda"]
    file: "arch-family.bash.tmpl"

  - id: "manjaro"
    like: ["manjaro", "bigcommunity", "biglinux"]
    file: "arch-family.bash.tmpl"

  - id: "fedora"
    like: ["nobara"]
    file: "fedora.bash.tmpl"

  - id: "opensuse"
    like: ["suse", "opensuse-tumbleweed", "opensuse-slowroll"]
    file: "opensuse.bash.tmpl"

  - id: "alpine"
    like: []
    file: "alpine.bash.tmpl"
