# ==============================================================================
# 00. PROFILO DI RIMASTERIZZAZIONE PER FEDORA (OA) - EVOLUTION EDITION
# ==============================================================================

remaster:

  # ---------------------------------------------------------
  # 01. SETUP FILESYSTEM E MOUNT
  # ---------------------------------------------------------
  - name: "coa-fs-setup"
    description: "Preparazione filesystem e mount (proiezione host)"
    action: "oa_mount_logic" # Go espanderà questo in oa_mkdir, oa_cp e oa_bind

  # ---------------------------------------------------------
  # 02. PREPARAZIONE BOOTLOADERS E UEFI
  # ---------------------------------------------------------
  - name: "coa-bootloaders"
    description: "Copia dei bootloader e creazione immagine FAT per UEFI"
    action: "oa_shell"
    chroot: false
    run_command: |
      set -e
      mkdir -p /home/eggs/isodir/live
      mkdir -p /home/eggs/isodir/isolinux
      mkdir -p /home/eggs/isodir/boot/grub
      mkdir -p /home/eggs/isodir/EFI/BOOT
      
      # ISOLINUX
      cp /tmp/coa/bootloaders/ISOLINUX/isolinux.bin /home/eggs/isodir/isolinux/
      cp /tmp/coa/bootloaders/syslinux/modules/bios/*.c32 /home/eggs/isodir/isolinux/
      cp /tmp/coa/bootloaders/ISOLINUX/isolinux.cfg /home/eggs/isodir/isolinux/ 2>/dev/null || touch /home/eggs/isodir/isolinux/isolinux.cfg
      
      # GRUB & UEFI
      cp /tmp/coa/bootloaders/grub/grub.cfg /home/eggs/isodir/boot/grub/ 2>/dev/null || touch /home/eggs/isodir/boot/grub/grub.cfg
      cp /tmp/coa/bootloaders/grub/x86_64-efi/monolithic/grubx64.efi /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI
      
      # Creazione FAT EFI IMG
      dd if=/dev/zero of=/home/eggs/isodir/EFI/BOOT/efi.img bs=1k count=8192
      mkfs.vfat /home/eggs/isodir/EFI/BOOT/efi.img
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI/BOOT
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI ::/EFI/BOOT/BOOTX64.EFI
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/boot/grub/grub.cfg ::/EFI/BOOT/grub.cfg

  # ---------------------------------------------------------
  # 03. GESTIONE IDENTITÀ UTENTE
  # ---------------------------------------------------------
  - name: "coa-identity"
    description: "Gestione nativa identità (Purge & Inject stile Yocto)"
    action: "oa_users"
    # Nota: Go inietterà automaticamente l'oggetto "users" qui

  # ---------------------------------------------------------
  # 04. ENABLE SUDO USER LIVE
  # ---------------------------------------------------------
  - name: "coa-enable-live"
    description: "Abilitazione poteri sudo per user live"
    action: "oa_shell"
    chroot: true
    run_command: |
      mkdir -p /etc/sudoers.d
      rm -f /etc/sudoers.d/00*
      echo "live ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/00-live
      chmod 0440 /etc/sudoers.d/00-live

  # ---------------------------------------------------------
  # 05. GENERAZIONE INITRAMFS (FEDORA STYLE)
  # ---------------------------------------------------------
  - name: "coa-initrd"
    description: "Generazione Initramfs tramite dracut (Fedora)"
    action: "oa_shell"
    chroot: true
    run_command: |
      dracut -f -v --no-hostonly --add "dmsquash-live livenet" /boot/initramfs-fedora.img

  # ---------------------------------------------------------
  # 06. COPIA KERNEL E INITRD (STANDARDIZZAZIONE ISO)
  # ---------------------------------------------------------
  - name: "coa-copy-kernel"
    description: "Copia del Kernel e Initrd per la ISO"
    action: "oa_shell"
    chroot: false
    run_command: |
      # Trova l'ultimo kernel evitando versioni rescue
      VMLINUZ=$(ls -v /home/eggs/liveroot/boot/vmlinuz-* | grep -v "rescue" | tail -n 1)
      cp "$VMLINUZ" /home/eggs/isodir/live/vmlinuz
      cp /home/eggs/liveroot/boot/initramfs-fedora.img /home/eggs/isodir/live/initrd.img

  # ---------------------------------------------------------
  # 07. GENERAZIONE MENU DI BOOT (GRUB/ISOLINUX/EFI)
  # ---------------------------------------------------------
  - name: "coa-live-menus"
    description: "Generazione configurazioni di boot con fix per splash screen"
    action: "oa_shell"
    chroot: false
    run_command: |
      set -e
      # 1. Variabili e Identità
      VOL_ID="OA_LIVE"
      BOOT_PARAMS="root=live:LABEL=${VOL_ID} rd.live.image selinux=0 quiet splash"
      WORK_DIR="/home/eggs/isodir"
      ASSETS_DIR="/etc/oa-tools.d/brain.d/assets"
      
      # Recupero del nome reale dell'host per il branding
      PRETTY=$(grep "PRETTY_NAME" /home/eggs/liveroot/etc/os-release | cut -d'"' -f2 || echo "OA Live")

      # 2. Creazione Directory (Sempre prima di copiare!)
      mkdir -p ${WORK_DIR}/boot/grub
      mkdir -p ${WORK_DIR}/isolinux
      mkdir -p ${WORK_DIR}/EFI/BOOT

      # 3. COPIA ASSETS (Spostata all'inizio per sicurezza)
      # Copia dello splash screen
      if [ -f "${ASSETS_DIR}/splash.png" ]; then
          cp "${ASSETS_DIR}/splash.png" ${WORK_DIR}/boot/grub/splash.png
          cp "${ASSETS_DIR}/splash.png" ${WORK_DIR}/isolinux/splash.png
          echo "✅ Splash screen copiato con successo."
      else
          echo "⚠️ ATTENZIONE: splash.png non trovato in ${ASSETS_DIR}"
      fi

      # Copia del font Unicode
      if [ -f "/usr/share/grub/unicode.pf2" ]; then
          cp /usr/share/grub/unicode.pf2 ${WORK_DIR}/boot/grub/font.pf2
      elif [ -f "${ASSETS_DIR}/unicode.pf2" ]; then
          cp "${ASSETS_DIR}/unicode.pf2" ${WORK_DIR}/boot/grub/font.pf2
      fi

      # 4. Generazione GRUB.cfg
      cat <<EOF > ${WORK_DIR}/boot/grub/grub.cfg
      set timeout=5
      set default=2

      insmod efi_gop
      insmod efi_uga
      insmod all_video
      insmod gfxterm
      insmod png

      # Fondamentale: imposta la root per trovare i file nella ISO
      search --no-floppy --set=root --label ${VOL_ID}

      # Caricamento Font e Terminale Grafico
      if loadfont /boot/grub/font.pf2; then
          set gfxmode=auto
          terminal_output gfxterm
      fi

      # Immagine di sfondo (Percorso assoluto basato sulla root della ISO)
      background_image /boot/grub/splash.png
      
      # Colori per contrasto su sfondo chiaro
      set menu_color_normal=black/black
      set menu_color_highlight=white/black

      # --- ELEMENTI ESTETICI ---
      # 0. Voce Titolo (non selezionabile o comunque inerte)
      menuentry "--- Penguins eggs (COA/OA Edition) ---" {
          true
      }

      # 1. Voce Vuota (Separatore)
      menuentry "" {
          true
      }

      # 2. Voce reale
      menuentry "Start $PRETTY" {
          linux /live/vmlinuz ${BOOT_PARAMS}
          initrd /live/initrd.img
      }

      menuentry "Start $PRETTY - RAM mode" {
          linux /live/vmlinuz ${BOOT_PARAMS} toram
          initrd /live/initrd.img
      }
      EOF

      # 5. Generazione ISOLINUX.cfg
      cat <<EOF > ${WORK_DIR}/isolinux/isolinux.cfg
      UI vesamenu.c32
      TIMEOUT 50
      DEFAULT live

      # In Isolinux lo splash deve essere nella stessa cartella o percorso relativo
      MENU BACKGROUND splash.png
      MENU TITLE Penguins eggs (COA/OA edition)

      LABEL live
          MENU LABEL Start $PRETTY
          LINUX /live/vmlinuz
          APPEND initrd=/live/initrd.img ${BOOT_PARAMS}

      LABEL ram
          MENU LABEL Start $PRETTY - RAM mode
          LINUX /live/vmlinuz
          APPEND initrd=/live/initrd.img ${BOOT_PARAMS} toram
      EOF

      # 6. Generazione Trampolino EFI
      cat <<EOF > ${WORK_DIR}/EFI/BOOT/grub.cfg
      search --set=root --file /live/filesystem.squashfs
      set prefix=(\$root)/boot/grub
      configfile \$prefix/grub.cfg
      EOF


  # ---------------------------------------------------------
  # 08. COMPRESSIONE SQUASHFS
  # ---------------------------------------------------------
  - name: "coa-squashfs"
    description: "Compressione del sistema (SquashFS zstd)"
    action: "oa_shell"
    run_command: "mksquashfs /home/eggs/liveroot /home/eggs/isodir/live/filesystem.squashfs -comp zstd -Xcompression-level 3 -b 1M -processors 4 -noappend -wildcards -ef /tmp/coa/excludes.list"

# ---------------------------------------------------------
  # 09. FEDORA-COMPATIBILITY: Hardlink per ingannare dracut
  # ---------------------------------------------------------
  - name: "coa-fedora-compat"
    description: "Creazione gancio di compatibilità per Fedora (LiveOS)"
    action: "oa_shell"
    chroot: false
    run_command: |
      cd /home/eggs/isodir
      mkdir -p LiveOS
      # Fedora cerca /LiveOS/squashfs.img per montare il sistema
      ln -f live/filesystem.squashfs LiveOS/squashfs.img

  # ---------------------------------------------------------
  # 10. MASTERIZZAZIONE ISO (XORRISO)
  # ---------------------------------------------------------
  - name: "coa-xorriso"
    description: "Creazione della ISO finale con xorriso"
    action: "oa_shell"
    chroot: false
    run_command: "xorriso -as mkisofs -iso-level 3 -R -J -joliet-long -l -cache-inodes -V 'OA_LIVE' -isohybrid-mbr /tmp/coa/bootloaders/ISOLINUX/isohdpfx.bin -partition_offset 16 -A 'OA_LIVE' -b isolinux/isolinux.bin -c isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -eltorito-alt-boot -e EFI/BOOT/efi.img -no-emul-boot -isohybrid-gpt-basdat -o ${ISO_OUTPUT} /home/eggs/isodir"

  # ---------------------------------------------------------
  # 11. PULIZIA FINALE E UMOUNT
  # ---------------------------------------------------------
  - name: "coa-cleanup"
    description: "Smontaggio e pulizia finale (Smart Umount)"
    action: "oa_umount"

# ==============================================================================
# 01. PROFILO DI INSTALLAZIONE
# ==============================================================================
install:
  # ---------------------------------------------------------
  # 01. coa-bootloader FEDORA
  # ---------------------------------------------------------
  - name: "bootloader"
    description: "remove live, update initramfs, installa GRUB"
    action: "shell"        # Azione diretta senza wrapper
    chroot: false          # Viene usata nel live
    run_command: |
      #!/bin/bash
      set -e

      rm -f /etc/sudoers.d/00-live

      if [ -f /etc/default/grub ]; then
          sed -i 's/GRUB_ENABLE_BLSCFG=true/GRUB_ENABLE_BLSCFG=false/' /etc/default/grub
      fi

      dracut -f --regenerate-all

      if [ -d /sys/firmware/efi ]; then
          grub2-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=oa-live --recheck
          mkdir -p /boot/efi/EFI/fedora
          grub2-mkconfig -o /boot/efi/EFI/fedora/grub.cfg
      else
          TARGET_DISK=$(grub2-probe -t disk / 2>/dev/null || echo "/dev/sda")
          grub2-install --target=i386-pc --recheck "$TARGET_DISK"
      fi

      grub2-mkconfig -o /boot/grub2/grub.cfg