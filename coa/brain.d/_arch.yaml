# ==============================================================================
# 00. PROFILO DI RIMASTERIZZAZIONE PER ARCH LINUX (OA) - EVOLUTION EDITION
# ==============================================================================

remaster:

  # ---------------------------------------------------------
  # 01. SETUP FILESYSTEM E MOUNT
  # ---------------------------------------------------------
  - name: "coa-fs-setup"
    description: "Preparazione filesystem e mount (proiezione host)"
    action: "oa_mount_logic"

  # ---------------------------------------------------------
  # 02. PREPARAZIONE BOOTLOADERS E UEFI
  # ---------------------------------------------------------
  - name: "coa-bootloaders"
    description: "Copia dei bootloader e creazione immagine FAT per UEFI"
    action: "oa_shell"
    run_command: |
      set -e
      mkdir -p /home/eggs/isodir/live
      mkdir -p /home/eggs/isodir/isolinux
      mkdir -p /home/eggs/isodir/boot/grub
      mkdir -p /home/eggs/isodir/EFI/BOOT
      
      # ISOLINUX
      cp /tmp/coa/bootloaders/ISOLINUX/isolinux.bin /home/eggs/isodir/isolinux/
      cp /tmp/coa/bootloaders/syslinux/modules/bios/*.c32 /home/eggs/isodir/isolinux/
      cp /tmp/coa/bootloaders/ISOLINUX/isolinux.cfg /home/eggs/isodir/isolinux/ 2>/dev/null || touch /home/eggs/isodir/isolinux/isolinux.cfg
      
      # GRUB & UEFI
      cp /tmp/coa/bootloaders/grub/grub.cfg /home/eggs/isodir/boot/grub/ 2>/dev/null || touch /home/eggs/isodir/boot/grub/grub.cfg
      cp /tmp/coa/bootloaders/grub/x86_64-efi/monolithic/grubx64.efi /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI
      
      # Creazione FAT EFI IMG
      dd if=/dev/zero of=/home/eggs/isodir/EFI/BOOT/efi.img bs=1k count=8192
      mkfs.vfat /home/eggs/isodir/EFI/BOOT/efi.img
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI
      mmd -i /home/eggs/isodir/EFI/BOOT/efi.img ::/EFI/BOOT
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/EFI/BOOT/BOOTX64.EFI ::/EFI/BOOT/BOOTX64.EFI
      mcopy -i /home/eggs/isodir/EFI/BOOT/efi.img /home/eggs/isodir/boot/grub/grub.cfg ::/EFI/BOOT/grub.cfg

  # ---------------------------------------------------------
  # 03. GESTIONE IDENTITÀ
  # ---------------------------------------------------------
  - name: "coa-identity"
    description: "Gestione nativa identità (Purge & Inject stile Yocto)"
    action: "oa_users"

  # ---------------------------------------------------------
  # 04. ENABLE SUDO USER LIVE
  # ---------------------------------------------------------
  - name: "coa-enable-live"
    description: "Abilitazione poteri sudo per user live"
    action: "oa_shell"
    run_command: |
      mkdir -p /etc/sudoers.d
      rm -f /etc/sudoers.d/00*
      echo "live ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/00-live
      chmod 0440 /etc/sudoers.d/00-live
    chroot: true

  # ---------------------------------------------------------
  # 05. GENERAZIONE INITRAMFS
  # ---------------------------------------------------------
  - name: "coa-initrd"
    description: "Generazione Initramfs dinamico tramite mkinitcpio (Arch)"
    action: "oa_shell"
    run_command: |
      # 1. Backup della configurazione originale
      mv /etc/mkinitcpio.conf /etc/mkinitcpio.conf.bak
      
      # 2. Scrittura "al volo" della configurazione Live
      cat << 'EOF' > /etc/mkinitcpio.conf
      MODULES=(loop dm-snapshot btrfs)
      HOOKS=(base udev microcode modconf kms archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems keyboard keymap consolefont filesystems fsck)
      COMPRESSION="zstd"      
      # --- FINE CONFIGURAZIONE LIVE ---
      EOF
      
      # 3. Compilazione del nuovo initramfs
      mkinitcpio -P
      
      # 4. Ripristino configurazione standard per l'installazione futura
      mv /etc/mkinitcpio.conf.bak /etc/mkinitcpio.conf
    chroot: true

  # ---------------------------------------------------------
  # 06. COPIA KERNEL E INITRD (DINAMICA)
  # ---------------------------------------------------------
  - name: "coa-kernel-copy"
    description: "Copia del Kernel e Initrd (auto-rilevamento Arch)"
    action: "oa_shell"
    run_command: |
      # Troviamo dinamicamente il primo kernel e il suo initramfs principale (ignorando i fallback)
      KERNEL=$(ls /home/eggs/liveroot/boot/vmlinuz-* | head -n 1)
      INITRD=$(ls /home/eggs/liveroot/boot/initramfs-*.img | grep -v fallback | head -n 1)
      
      if [ -z "$KERNEL" ] || [ -z "$INITRD" ]; then
        echo "ERRORE CRITICO: Kernel o Initrd non trovati in /boot!" >&2
        exit 1
      fi
      
      cp "$KERNEL" /home/eggs/isodir/live/vmlinuz
      cp "$INITRD" /home/eggs/isodir/live/initrd.img
    chroot: false

  # ---------------------------------------------------------
  # 07. GENERAZIONE MENU DI BOOT (GRUB/ISOLINUX/EFI)
  # ---------------------------------------------------------
  - name: "coa-live-menus"
    description: "Generazione configurazioni di boot con branding e splash"
    action: "oa_shell"
    chroot: false
    run_command: |
      set -e
      # 1. Variabili di ambiente e branding
      VOL_ID="OA_LIVE"
      BOOT_PARAMS="archisobasedir=arch archisolabel=${VOL_ID} cow_spacesize=2G quiet splash"
      WORK_DIR="/home/eggs/isodir"
      # Recuperiamo il nome reale della distro
      PRETTY=$(grep "PRETTY_NAME" /etc/os-release | cut -d'"' -f2 || echo "OA Live")

      # 2. Creazione Directory
      mkdir -p ${WORK_DIR}/boot/grub
      mkdir -p ${WORK_DIR}/isolinux
      mkdir -p ${WORK_DIR}/EFI/BOOT

      # 3. Copia Assets (Font e Splash)
      # Copia del font Unicode per evitare i quadratini
      cp /usr/share/grub/unicode.pf2 ${WORK_DIR}/boot/grub/font.pf2 || echo "Font non trovato, ignoro."
      
      # Copia dello splash screen dagli asset locali
      if [ -f "/etc/oa-tools.d/brain.d/assets/splash.png" ]; then
          cp /etc/oa-tools.d/brain.d/assets/splash.png ${WORK_DIR}/boot/grub/splash.png
          cp /etc/oa-tools.d/brain.d/assets/splash.png ${WORK_DIR}/isolinux/splash.png
      fi

      # 4. Generazione GRUB.cfg (Main)
      cat <<EOF > ${WORK_DIR}/boot/grub/grub.cfg
      set timeout=5
      set default=0

      insmod all_video
      insmod gfxterm
      insmod png
      insmod part_gpt
      insmod part_msdos
      insmod fat
      insmod iso9660

      # Caricamento Font e Terminale Grafico
      if loadfont /boot/grub/font.pf2; then
          set gfxmode=auto
          terminal_output gfxterm
      fi

      # Immagine di sfondo e colori (nero su trasparente per contrasto)
      background_image /boot/grub/splash.png
      set menu_color_normal=black/black
      set menu_color_highlight=white/black
      
      search --no-floppy --set=root --label ${VOL_ID}

      menuentry "Start $PRETTY" {
          linux /live/vmlinuz ${BOOT_PARAMS}
          initrd /live/initrd.img
      }

      menuentry "Start $PRETTY - RAM mode" {
          linux /live/vmlinuz ${BOOT_PARAMS} toram
          initrd /live/initrd.img
      }
      EOF

      # 5. Generazione ISOLINUX.cfg (BIOS)
      cat <<EOF > ${WORK_DIR}/isolinux/isolinux.cfg
      UI vesamenu.c32
      TIMEOUT 50
      DEFAULT live

      MENU BACKGROUND splash.png
      MENU TITLE Penguins eggs (COA/OA edition)

      LABEL live
          MENU LABEL Start $PRETTY
          LINUX /live/vmlinuz
          APPEND ${BOOT_PARAMS}
          INITRD /live/initrd.img

      LABEL ram
          MENU LABEL Start $PRETTY - RAM mode
          LINUX /live/vmlinuz
          APPEND ${BOOT_PARAMS} toram
          INITRD /live/initrd.img
      EOF

      # 6. Generazione Trampolino EFI
      cat <<EOF > ${WORK_DIR}/EFI/BOOT/grub.cfg
      search --set=root --file /live/filesystem.squashfs
      set prefix=(\$root)/boot/grub
      configfile \$prefix/grub.cfg
      EOF

  # ---------------------------------------------------------
  # 08. COMPRESSIONE SQUASHFS
  # ---------------------------------------------------------
  - name: "coa-squashfs"
    description: "Compressione del sistema (ZSTD)"
    action: "oa_shell"
    run_command: "mksquashfs /home/eggs/liveroot /home/eggs/isodir/live/filesystem.squashfs -comp zstd -Xcompression-level 3 -b 1M -processors 4 -noappend -wildcards -ef /tmp/coa/excludes.list"

  # ---------------------------------------------------------
  # 09. ARCH-COMPATIBILITY: Hardlink per ingannare gli hook archiso
  # ---------------------------------------------------------
  - name: "coa-arch-compat"
    description: "Creazione gancio di compatibilità per Archiso"
    action: "oa_shell"
    run_command: |
      cd /home/eggs/isodir
      mkdir -p arch/x86_64
      ln -f live/filesystem.squashfs arch/x86_64/airootfs.sfs
    chroot: false

  # ---------------------------------------------------------
  # 10. MASTERIZZAZIONE ISO (XORRISO)
  # ---------------------------------------------------------
  - name: "coa-xorriso"
    description: "Masterizzazione ISO finale"
    action: "oa_shell"
    run_command: "xorriso -as mkisofs -iso-level 3 -R -J -joliet-long -l -cache-inodes -V 'OA_LIVE' -isohybrid-mbr /tmp/coa/bootloaders/ISOLINUX/isohdpfx.bin -partition_offset 16 -A 'OA_LIVE' -b isolinux/isolinux.bin -c isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -eltorito-alt-boot -e EFI/BOOT/efi.img -no-emul-boot -isohybrid-gpt-basdat -o ${ISO_OUTPUT} /home/eggs/isodir"

  # ---------------------------------------------------------
  # 11. PULIZIA FINALE
  # ---------------------------------------------------------
  - name: "coa-cleanup"
    description: "Smontaggio e pulizia"
    action: "oa_umount"

# ==============================================================================
# 01. PROFILO DI INSTALLAZIONE - LOGICA POST-COPY
# ==============================================================================
install:
  # ---------------------------------------------------------
  # 01. coa-bootloader ARCH
  # ---------------------------------------------------------
  - name: "coa-bootloaders"
    description: "Copia dei bootloader e creazione immagine FAT per UEFI"
    action: "oa_shell"
    run_command: |
      #!/bin/bash
      set -e

      rm -f /etc/sudoers.d/00-live
      mkinitcpio -P

      if [ -d /sys/firmware/efi ]; then
          grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=oa-live --recheck
      else
          TARGET_DISK=$(grub-probe -t disk / 2>/dev/null || echo "/dev/sda")
          grub-install --target=i386-pc --recheck "$TARGET_DISK"
      fi

      grub-mkconfig -o /boot/grub/grub.cfg