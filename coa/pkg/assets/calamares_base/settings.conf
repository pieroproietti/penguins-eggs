# ==============================================================================
# settings.conf per oa-tools / Krill
# Basato sul template ufficiale Calamares Codeberg
# ==============================================================================
---

# 1. RICERCA MODULI
# Usiamo "local" per i plugin di sistema e aggiungiamo i path assoluti
# per le tue configurazioni personalizzate.
modules-search: [ local ]

# Path aggiuntivi per i componenti grafici (fondamentale per Qt6/Calamares 3.3)
qml-modules-search:
  - /usr/share/calamares/qml
  - /usr/lib/x86_64-linux-gnu/qml

# Dove cercare la cartella 'eggs' (deve contenere branding.desc)
branding-search: [ "/etc/oa-tools.d/installer.d/branding" ]

# 2. SEQUENZA OPERAZIONI
sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - shellprocess@live-cleanup
      - shellprocess@oa-chroot-runner
      - removeuser
      - umount
  - show:
      - finished

# 3. ISTANZE PERSONALIZZATE (I tuoi script oa-tools)
instances:
  - id:       live-cleanup.conf
    module:   shellprocess
    config:   shellprocess_live-cleanup.conf
    
  - id:       oa-chroot-runner
    module:   shellprocess
    config:   shellprocess_oa-chroot-runner.conf

# 4. BRANDING E COMPORTAMENTO (Parametri obbligatori)
branding: eggs

# Calamares "si lamenterà" se questi non sono esplicitamente impostati (come da commenti originale)
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: true
quit-at-end: false